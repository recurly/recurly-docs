    post:
      summary: Log Usage
      description: >-
        Log usage to your customer's purchased usage based add-ons.



        ###### ATTENTION:

        <div class="alert alert--danger" markdown="1">

        If you'd like to set `usage_timestamp` or `recording_timestamp` to
        "now," please leave those fields blank. This will allow the server to
        set the values. Manually setting `usage_timestamp` and/or
        `recording_timestamp` to "now" has been known to trigger the following
        error when clocks get skewed: "Cannot create usage record with a usage
        timestamp in the future."

        </div>
            
      tags:
        - subscription-usage-records
      operationId: logUsage
      parameters:
        - in: path
          name: subscription_uuid
          schema:
            type: string
            default: ''
          required: true
          description: Subscription's unique identifier.
        - in: path
          name: add_on_code
          schema:
            type: string
            default: ''
          required: true
          description: The unique add-on code.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              required:
                - amount
              properties:
                amount:
                  type: integer
                  default: ''
                  description: >-
                    The amount of usage. Can be positive, negative, or 0. If the
                    Decimal Quantity feature is enabled, this value will be
                    rounded to nine decimal places.  Otherwise, all digits after
                    the decimal will be stripped. If the usage-based add-on is
                    billed with a percentage, your usage should be a monetary
                    amount formatted in cents (e.g., $5.00 is "500").
                merchant_tag:
                  type: string
                  default: ''
                  description: >-
                    Custom field great for recording the id in your own system
                    associated with the usage, so you can provide auditable
                    usage displays to your customers using a GET on this
                    endpoint.
                recording_timestamp:
                  type: string
                  format: date-time
                  default: usage_timestamp value
                  description: >-
                    When the usage was recorded in your system. Defaults to
                    current timestamp.
                usage_timestamp:
                  type: string
                  format: date-time
                  default: ''
                  description: >-
                    When the usage actually happened. This will define the line
                    item dates this usage is billed under and is important for
                    revenue recognition. Defaults to current timestamp.
      responses:
        '201':
          description: ''
          content:
            application/xml:
              example: >-
                <usage
                href="https://your-subdomain.recurly.com/v2/subscriptions/374ae5e848adcfd332fdd3469d89c888/add_ons/video_streaming/usage/450646065398417338">
