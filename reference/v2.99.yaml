  /accounts:
    get:
      summary: List Accounts
      description: >-
        Returns a list of accounts on your site. Results are ordered by the time
        created, sorted by newest first.


        **Account Query States**


        | state | description |

        | --- | --- |

        | `active` | Open accounts. |

        | `closed` | Accounts that are not open. |

        | `subscriber` | Accounts with subscriptions that are valid for the
        current time. This includes subscriptions in a trial period. |

        | `non_subscriber` | Accounts without subscriptions that are valid for
        the current time. |

        | `past_due` | Accounts with invoices that have failed initial
        collection but still have collection attempts remaining. |




        <div class="alert alert--warning" markdown="1">

        Please note: a queried state and the base state of a returned account
        may differ. For example, querying for `past_due` account will not result
        in a list of accounts with a `past_due` state (they will either be
        `active` or `closed`). Only base states (`active`, `closed`) will be
        present in the returned account records.

        </div>
            
      tags:
        - accounts
      operationId: listAccounts
      parameters:
        - in: query
          name: state
          schema:
            type: string
            default: ''
          description: >-
            The state of accounts to return: `active`, `closed`, `subscriber`,
            `non_subscriber`, `past_due`.
        - in: query
          name: sort
          schema:
            type: string
            default: created_at
          description: >-
            The attribute that will be used to order records: `created_at`,
            `updated_at`.
        - in: query
          name: order
          schema:
            type: string
            default: desc
          description: >-
            The order in which products will be returned: `asc` for ascending
            order, `desc` for descending order.
        - in: query
          name: begin_time
          schema:
            type: string
            format: date-time
            default: ''
          description: >-
            Operates on the attribute specified by the sort parameter. Filters
            records to only include those with datetimes greater than or equal
            to the supplied datetime. Accepts an ISO 8601 date or date and time.
        - in: query
          name: end_time
          schema:
            type: string
            format: date-time
            default: ''
          description: >-
            Operates on the attribute specified by the sort parameter. Filters
            records to only include those with datetimes less than or equal to
            the supplied datetime. Accepts an ISO 8601 date or date and time.
        - in: query
          name: per_page
          schema:
            type: integer
            default: '50'
          description: Number of records to return per page, up to a maximum of 200.
        - in: query
          name: cursor
          schema:
            type: integer
            default: ''
          description: >-
            Splits records across pages. Leave blank to return the first page.
            Follow the URI in the first page's Link header to fetch the next
            page.
      responses:
        '200':
          description: ''
          content:
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
                xml:
                  name: accounts
              example: |-
