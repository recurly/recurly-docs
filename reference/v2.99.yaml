    post:
      summary: Preview Invoice
      description: >-
        Preview allows you to display the invoice details, including estimated
        tax, before you post it.




        <div class="alert alert--warning" markdown="1">

        This API call will return the new invoice's details on success. If there
        are no pending charges, it will return an HTTP status code of `422
        Unprocessable Entity`.

        </div>
            
      tags:
        - invoices
      operationId: previewInvoice
      parameters:
        - in: path
          name: account_code
          schema:
            type: string
            default: ''
          required: true
          description: Unique account identifier.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                terms_and_conditions:
                  type: string
                  default: ''
                  description: >-
                    Optional notes field. This will default to the Terms and
                    Conditions text specified on the Invoice Settings page in
                    your Recurly admin. Specify custom notes with this tag to
                    add or override Terms and Conditions. Custom notes will stay
                    with a subscription on all renewals.
                customer_notes:
                  type: string
                  default: ''
                  description: >-
                    Optional notes field. This will default to the Customer
                    Notes text specified on the Invoice Settings page in your
                    Recurly admin. Specify custom notes with this tag to add
                    Customer Notes. Custom notes made on an invoice for a one
                    time charge will not carry over to subsequent invoices.
                vat_reverse_charge_notes:
                  type: string
                  default: ''
                  description: >-
                    VAT Reverse Charge Notes only appear if you have EU VAT
                    enabled or are using your own Avalara AvaTax account and the
                    customer is in the EU, has a VAT number, and is in a
                    different country than your own. This will default to the
                    VAT Reverse Charge Notes text specified on the Tax Settings
                    page in your Recurly admin, unless custom notes were created
                    with the original subscription. Specify custom notes with
                    this tag to add or override VAT Reverse Charge Notes. Custom
                    notes will stay with a subscription on all renewals.
                collection_method:
                  type: string
                  default: automatic
                  description: Can be either `automatic` or `manual`.
                net_terms:
                  $ref: '#/components/schemas/NetTerms'
                net_terms_type:
                  $ref: '#/components/schemas/NetTermsTypeEnum'
                po_number:
