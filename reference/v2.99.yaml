    put:
      summary: Restore Coupon
      description: >-
        Make an expired coupon redeemable again. You can change editable fields
        in this call.




        <div class="alert alert--info" markdown="1">

        If you aren't going to change anything in the restore action, include
        the coupon parameter: <coupon/>

        </div>


        ##### Restore Coupon That Reached Redeem By Date

        If your coupon has a redeem by date in the past, you must remove the
        date or change it to a future date, otherwise you will get this error:


        ```

        <errors>
            <error field="coupon.redeem_by_date" symbol="in_past">must be in the future</error>
        </errors>

        ```

        ##### Restore Coupon That Reached Max Redemptions

        If your coupon has reached it's max redemptions, you must remove the max
        redemptions or change it to a greater number. You cannot set max
        redemptions to anything less than the number of redemptions you have. If
        you do not update max redemptions in this case, you will get this error.


        ```

        <errors>
            <error field="coupon.max_redemptions" symbol="too_low">must be greater than 100</error>
        </errors>

        ```

        ##### Restoring Bulk Coupons or Unique Codes

        Restoring a bulk coupon will restore the coupon campaign and all unique
        codes that have not been redeemed or individually expired.


        You can restore an individual unique code if the bulk coupon is active
        by using the unique code's coupon code in the call.
