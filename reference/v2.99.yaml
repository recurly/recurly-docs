    post:
      summary: Generate Unique Codes
      description: >-
        Create unique codes for a bulk coupon. A bulk coupon can have up to
        100,000 unique codes (or your site's configured limit). The endpoint can
        be called multiple times to create the number of unique codes you need.


        ##### View Unique Codes

        The response will include the location of the unique codes as link in
        the header:

        ```

        https://your-subdomain.recurly.com/v2/coupons/savemore/unique_coupon_codes?cursor=1792526747654056328&per_page=200

        ```
      tags:
        - coupons
      operationId: generateUniqueCodes
      parameters:
        - in: path
          name: coupon_code
          schema:
            type: string
            default: ''
          required: true
          description: Unique code to identify and redeem the coupon.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                number_of_unique_codes:
                  type: integer
                  default: ''
                  description: >-
                    Number of unique codes you want to generate for the bulk
                    coupon. Must be between 1 and 100,000 (or your site's
                    configured limit).
      responses:
        '201':
          description: ''
          content:
            application/text:
              example: >-
                HTTP/1.1 201 Created

                Content-Type: application/xml; charset=utf-8

                Location:
                https://your-subdomain.recurly.com/v2/coupons/thankyou/unique_coupon_codes?cursor=1998184141762793924%3A1468970111&per_page=200
        '400':
          description: ''
          content:
            application/xml:
              example: |-
                <!-- Request Too High -->
                <error>
                  <symbol>number_of_unique_codes</symbol>
                  <description>You are limited to generating 200 at a time</description>
                </error>

                <!-- Request In Progress -->
                <error>
                  <symbol>number_of_unique_codes</symbol>
                  <description>Number of unique codes cannot be generated; unique code creation is in progress, please wait for it to finish and try again</description>
                </error>

                <!-- Max Reached -->
                <error>
                  <symbol>number_of_unique_codes</symbol>
                  <description>Number of unique codes can only generate a total of 100000 codes</description>
                </error>

                <!-- Not Bulk Coupon -->
                <error>
                  <symbol>number_of_unique_codes</symbol>
                  <description>Coupon must be of type bulk to generate unique codes</description>
                </error>
      x-codeSamples:
