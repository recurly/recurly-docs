    put:
      summary: Collect an Invoice
      description: >+
        Allows to collect a past-due or pending invoice. This API is rate
        limited and only one collection attempt per account is allowed within an
        hour. This API endpoint is only available in API version 2.5 or higher.

      tags:
        - invoices
      operationId: collectAnInvoice
      parameters:
        - in: path
          name: invoice_number
          schema:
            type: string
            default: ''
          required: true
          description: Invoice number to collect
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                transaction_type:
                  type: string
                  default: ''
                  description: >-
                    Indicates type of resulting transaction. accepted_values:
                    "moto".
                billing_info:
                  type: object
                  default: ''
                  description: >-
                    Accepts nested three_d_secure_action_result_token_id
                    (string)
                billing_info_uuid:
                  type: string
                  description: >-
                    The `billing_info_uuid` is the value that represents a
                    specific billing info for an end customer. When
                    `billing_info_uuid` is used to assign billing info to the
                    subscription, all future billing events for the subscription
                    will bill to the specified billing info. `billing_info_uuid`
                    can ONLY be used for sites utilizing the Wallet feature.
