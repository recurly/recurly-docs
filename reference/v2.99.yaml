  /subscriptions:
    get:
      summary: List Subscriptions
      description: >-
        Returns a list of all the subscriptions.


        **Subscription Query States**


        | state | description |

        | --- | --- |

        | active | Subscriptions that are valid for the current time. This
        includes subscriptions in a trial period |

        | canceled | Subscriptions that are valid for the current time but will
        not renew because a cancelation was requested |

        | paused | Subscriptions that are currently paused |

        | expired | Subscriptions that have expired and are no longer valid |

        | future | Subscriptions that will start in the future, they are not
        active yet |

        | in_trial | Subscriptions that are active or canceled and are in a
        trial period |

        | live | All subscriptions that are not expired |

        | past_due | Subscriptions that are active or canceled and have a
        past-due invoice |




        <div class="alert alert--warning" markdown="1">

        Please note: a queried state and the base state of a returned
        subscription may differ. For example, querying for past_due
        subscriptions will not result in a list of subscriptions with a
        'past_due' state (they will either be 'active' or 'canceled'). Only base
        states ('pending', 'active', 'canceled', 'expired', 'future') will be
        present in the returned subscription records.

        </div>
            
      tags:
        - subscriptions
      operationId: listSubscriptions
      parameters:
        - in: query
          name: state
          schema:
            type: string
            default: ''
          description: >-
            The state of subscriptions to return: `active`, `paused`,
            `canceled`, `expired`, `future`, `in_trial`, `live`, or `past_due`.
            A subscription may belong to more than one state.
        - in: query
          name: cursor
          schema:
            type: string
            default: ''
          description: >-
            Splits records across pages. Leave blank to return the first page.
            Follow the URI in the first page's Link header to fetch the next
            page.
        - in: query
          name: sort
          schema:
            type: string
            default: created_at
          description: >-
            The attribute that will be used to order records: `created_at`,
            `updated_at`.
        - in: query
          name: order
          schema:
            type: string
            default: desc
          description: >-
            The order in which products will be returned: `asc` for ascending
            order, `desc` for descending order.
        - in: query
          name: begin_time
          schema:
            type: string
            format: date-time
            default: ''
          description: >-
            Operates on the attribute specified by the sort parameter. Filters
            records to only include those with datetimes greater than or equal
            to the supplied datetime. Accepts an ISO 8601 date or date and time.
        - in: query
          name: end_time
          schema:
            type: string
            format: date-time
            default: ''
          description: >-
            Operates on the attribute specified by the sort parameter. Filters
            records to only include those with datetimes less than or equal to
            the supplied datetime. Accepts an ISO 8601 date or date and time.
        - in: query
          name: per_page
          schema:
            type: integer
            default: '50'
          description: Number of records to return per page, up to a maximum of 200.
      responses:
        '200':
          description: ''
          content:
            application/xml:
              schema:
                $ref: '#/components/schemas/SubscriptionsListResponse'
              examples:
                subscriptionsList:
                  $ref: '#/components/examples/SubscriptionListResponse'
                rampSubscriptionsList:
                  $ref: '#/components/examples/RampSubscriptionListResponse'
      x-codeSamples:
        - lang: PHP
          source: |-
            <?php

            $subscriptions = Recurly_SubscriptionList::getActive();
            foreach ($subscriptions as $subscription) {
              print "Subscription: $subscription\n";
            }
        - lang: Ruby
          source: |-
            Recurly::Subscription.find_each do |subscription|
              puts "Susbcription: #{subscription}"
            end
        - lang: Python
          source: |-
            #client version >= 2.1.6
            for subscription in Subscription.all():
                print 'Subscription: %s' % subscription

            #client version <= 2.1.5
            subscriptions = Subscription.all()
            while subscriptions:
                for subscription in subscriptions:
                    print 'Subscription: %s' % subscription
                try:
                    subscriptions = subscriptions.next_page()
                except PageError:
                    subscriptions = ()
        - lang: Dotnet
          source: |-
            using System.Linq;

            var subscriptions = Subscriptions.List();
            while (subscriptions.Any())
            {
                foreach (var subscription in subscriptions)
                    Console.WriteLine("Subscription: " + subscription);
                subscriptions = subscriptions.Next;
            }
    post:
      summary: Create Subscription
      description: >-
        ### Consider using Purchases


        <div class="alert alert--info" markdown="1">
          If you need to purchase multiple subscriptions at once or purchase a subscription along with additional charges or credits we recommend using the [Create Purchase](/docs/create-purchase) endpoint instead of this one. With it you can create an account, billing info, charges, credits and subscriptions, then invoice and collect payment in one step.
        </div>


        #### SUBSCRIPTION STARTS DATE


        If you would like the subscription to start on a specified date, please
        set the `trial_ends_at` parameter in your API request. Recurly will
        ignore any trial period currently specified on the plan and begin
        charging the subscription on the date specified. This is useful for
        creating your own, custom trial intervals and for importing existing
        subscriptions from an external system.


        #### CREATING AN ACCOUNT SIMULTANEOUSLY


        To avoid paying multiple transaction fees, Recurly allows you to create
        a subscription, account and billing information in one API call. That
        way the billing information can be validated when charging for the
        subscription.


        #### USING STORED BILLING INFO


        You may create a subscription without specifying billing information if
        an account already has stored billing information.


        #### REDEEMING A COUPON


        Redeem coupon codes within the create subscription action as a
        convenience or as a way to make sure the coupon is only redeemed if the
        subscription transaction is successful.


        If you are redeeming one coupon, pass in coupon_code:

        ```xml

        <coupon_code>special1</coupon_code>

        ```


        If you want to redeem multiple coupons, use the following format:

        ```xml

        <coupon_codes>
          <coupon_code>special1</coupon_code>
          <coupon_code>special2</coupon_code>
        </coupon_codes>

        ```


        NOTE: You must have Multiple Coupons Per Account enabled in Coupon
        Settings in order to redeem multiple coupons in the create subscription
        action.


        The coupon must have eligible charges that include the plan of the
        subscription you are creating. If the coupon has a redemption_resource
        of "subscription", it will automatically be tied to the subscription
        upon successful redemption.


        If you are redeeming a free trial coupon and also setting a
        trial_ends_at in the request, the subscriptions trial will follow the
        trial_ends_at, not the coupon rules.


        #### REDEEMING A GIFT CARD


        Redeem a gift card redemption code within the create subscription action
        as a convenience or as a way to make sure the gift card is only redeemed
        if the subscription transaction is successful. Only one gift card
        redemption code can be redeemed in the request


        Example XML Request:

        ```xml

        <gift_card>
            <redemption_code>JHD776JENN99E6DD</redemption_code>
        </gift_card>

        ```


        Note that the subscription response will not include information about
        the gift card, but will add two new parameters, `started_with_gift` and
        `converted_at`.
