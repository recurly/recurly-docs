       # API Support Policy and Roadmap
    [API Support Policy and
    Roadmap](https://recurly.com/developers/pages/api-v2/support-policy-and-roadmap.html)
       # Pagination
    ##### Next Link

    The amount of records returned within a single API request defaults to 50.
    It may be changed to a maximum of 200 using a `per_page` query parameter,
    e.g. to return 200 accounts at a time:


    ```

    https://your-subdomain.recurly.com/v2/accounts?per_page=200

    ```


    When there are more records remaining than fit in the current response, the
    `Link` header is specified with the URI to the next page of results.


    ```

    Status: 200 OKLink:
    <https://your-subdomain.recurly.com/v2/accounts?cursor=1972702718353176814%3A1465932489>;
    rel="next"ETag: "a4b0568a2278bc591ceb64b31547eb78"```


    The `cursor` parameter is a time-based pointer indicating where to resume
    the results. By using a cursor instead of page numbers, the API avoids
    returning duplicate records in the case where additional resources are added
    between pagination requests.

    ##### Sorting and Filtering
     Many endpoints support these advanced pagination parameters:

    * `sort` : String: The attribute that will be used to order records:
    `created_at`, `updated_at`. Defaults to `created_at`.

    * `order` : String : The order in which products will be returned: `asc` for
    ascending order, `desc` for descending order. Defaults to `desc`.

    * `begin_time` : Datetime : Operates on the attribute specified by the sort
    parameter. Filters records to only include those with datetimes greater than
    or equal to the supplied datetime. Accepts an ISO 8601 date or date and
    time.

    * `end_time` : Datetime : Operates on the attribute specified by the sort
    parameter. Filters records to only include those with datetimes less than or
    equal to the supplied datetime. Accepts an ISO 8601 date or date and time.


    Review the parameters on each endpoint for more details.


    ###### Updated at really means last updated at

    <div class="alert alert--info" markdown="1">

    An account that was updated on `2016-01-19` and then again on `2016-03-23`
    would not be returned in a request for
    `sort=updated_at&end_time=2016-03-01`.

    </div>
       ##### Counting Records
    Starting with API version 2.6, you must explicitly make a `HEAD` request to
    get the server count. Endpoints that return a list of resources will respond
    to this request and include a header indicating the total number of records
    available. They will not contain the xml body. The server count is specified
    with the `X-Records` header. E.g., for an endpoint with 14 records:


    ```

    X-Records: 14

    ```


    You can pass filtering parameters (described above) to narrow down the
    resources you wish to count. Consider the example of counting all
    `collected` invoices in `2016`. You can send a `HEAD` request to this
    endpoint then parse the count from the X-Records response header:


    ```

    https://your-subdomain.recurly.com/v2/invoices?begin_time=2016-01-01T00:00:00&end_time=2017-01-01T00:00:00&state=collected

    ```

    ##### Examples

    This will return accounts that were created on or before 2016-01-01 0:00 UTC
    in descending order of creation date:

    ```

    https://your-subdomain.recurly.com/v2/accounts?sort=created_at&order=desc&end_time=2016-01-01

    ```


    This will return accounts that were last updated on or after 2016-07-01
    10:30:01 Mountain Daylight Time in ascending order of updated date:


    ```

    https://your-subdomain.recurly.com/v2/accounts?sort=updated_at&order=asc&begin_time=2016-07-01T10:30:01-06:00

    ```


    ###### Beware of changes to records when sorting by updated_at

    <div class="alert alert--warning" markdown="1">

    It's important to be aware that when paging through records sorted by their
    `updated_at` value, the order will change if they are modified:

    * In ascending order, changes to records in previous pages will cause them
    to move back the end of the list, meaning you may see them multiple times.
    This can be avoided by using the time the pagination starts as the
    `end_time`.

    * In descending order, changes to records in later pages will cause them to
    move up to the beginning of the list, meaning you would miss results.

    </div>
