    post:
      summary: Create Gift Card
      description: >+
        Purchase a gift card on the gifter's account.


        Note: To use the gift cards API endpoints, some configuration is
        required. Please see [our
        docs](https://docs.recurly.com/docs/gift-cards) for further
        instructions.

      tags:
        - gift-cards
      operationId: createGiftCard
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              required:
                - product_code
                - unit_amount_in_cents
                - currency
                - delivery
                - method
                - gifter_account
                - account_code
              properties:
                product_code:
                  type: string
                  default: ''
                  description: The product code of the gift card product.
                unit_amount_in_cents:
                  type: integer
                  default: ''
                  description: >-
                    The amount of the gift card. Must match an amount on the
                    gift card product.
                currency:
                  type: string
                  default: ''
                  description: The currency of the `unit_amount_in_cents`.
                tax_service_opt_out:
                  type: boolean
                  default: false
                  description: >-
                    Set to `true` to bypass sending the purchase to your
                    configured tax service. Defaults to `false`.
                delivery:
                  type: object
                  default: ''
                  description: >-
                    Block of delivery information. Includes the params `method`
                    through `personal_message` below.
                method:
                  type: string
                  default: ''
                  description: Whether the delivery method is `email` or `post`.
                deliver_at:
                  type: string
                  format: date-time
                  default: ''
                  description: >-
                    When the gift card should be delivered to the recipient. If
                    null, the gift card will be delivered immediately. If a
                    datetime is provided, the delivery will be in an hourly
                    window, rounding down. For example, 6:23 pm will be in the
                    6:00 pm hourly batch. Must be at least an hour in the future
                    and less than a year in the future
                email_address:
                  type: string
                  default: ''
                  description: >-
                    The email address of the recipient. Required if `method` =
                    `email`.
                first_name:
                  type: string
                  default: ''
                  description: The first name of the recipient.
                last_name:
                  type: string
                  default: ''
                  description: The last name of the recipient.
                address:
                  type: object
                  default: ''
                  description: >-
                    Block of address information for the recipient. Includes the
                    params `address1` through `phone` below. Required if
                    `method` = `post`.
                address1:
                  type: string
                  default: ''
                  description: >-
                    The first street address line of the recipient. Required if
                    `method` = `post`.
                address2:
                  type: string
                  default: ''
                  description: The second street address line of the recipient.
                city:
                  type: string
                  default: ''
                  description: The city of the recipient. Required if `method` = `post`.
                state:
                  type: string
                  default: ''
                  description: >-
                    The state/province of the recipient. Required if `method` =
                    `post` and `country` = US, CA, IT or NL.
                zip:
                  type: string
                  default: ''
                  description: >-
                    The zip/postal code of the recipient. Required if `method` =
                    `post`.
                country:
                  type: string
                  default: ''
                  description: The country of the recipient. Required if `method` = `post`.
                phone:
                  type: string
                  default: ''
                  description: The phone number of the recipient.
                gifter_name:
                  type: string
                  default: ''
                  description: >-
                    The name of the gifter for the purpose of message displays
                    to the recipient.
                personal_message:
                  type: string
                  default: ''
                  description: >-
                    The personal message from the gifter to the recipient. 255
                    characters.
                gifter_account:
                  type: object
                  default: ''
                  description: >-
                    Block of account details for the gifter. This can reference
                    an existing `account_code` or create a new account using the
                    Account objects params. An `account_code` is required.
                account_code:
                  type: string
                  default: ''
                  description: The account code of the gifter's account.
                billing_info:
                  type: object
                  default: ''
                  description: >-
                    Accepts nested three_d_secure_action_result_token_id
                    (string)
      responses:
        '201':
          description: ''
          content:
            application/xml:
              examples:
                gcResponse:
                  $ref: '#/components/examples/GiftCardResponse'
              schema:
                $ref: '#/components/schemas/GiftCard'
        '404':
          description: ''
          content:
            application/xml:
              example: |-
                <!-- Wrong Amount -->
                <error>
                  <symbol>not_found</symbol>
                  <description lang="en-US">Gift card product with unit amount in cents of '2000' and 'USD' currency not found</description>
                </error>

                <!-- Wrong Product -->
                <?xml version="1.0" encoding="UTF-8"?>
                <error>
                    <symbol>not_found</symbol>
                    <description lang="en-US">Gift card product with product code 'gift_cards123' not found</description>
                </error>
      x-codeSamples:
