  /survey_sessions/{survey_session_id}/survey_responses:
    post:
      summary: Update a survey session
      tags:
        - cancellation-flows
      operationId: create_survey_response
      description: >-
        When a customer has completed the survey, this call updates their
        existing survey session and creates a new survey_response record. We
        guard against double-updating by checking that the current
        survey_session field of Outcome contains the value 'Incomplete' and the
        field of Status contains the value 'New'. If those conditions are true,
        the call sets the value for Outcome to Canceled and the value for Status
        to Answered and creates a new survey_response record.
      parameters:
        - $ref: '#/components/parameters/survey_session_id'
      requestBody:
        content:
          application/xml:
            schema:
              $ref: '#/components/schemas/SurveyResponseCreate'
            example: |-
              <survey_response>
                <question_version_id>sl6srh06spnx</question_version_id>
                <response_choice_version_id>slkn8kxcgxai</response_choice_version_id>
              </survey_response>
