  /subscriptions/{uuid}/terminate:
    parameters:
      - $ref: '#/components/parameters/subscription_uuid'
    put:
      summary: Terminate Subscription
      description: >-


        | Refund Type | Description |

        | --- | --- |

        | partial | Prorates a refund based on the amount of time remaining in
        the current bill cycle. |

        | full | Performs a full refund of the last charge for the current
        subscription term. |

        | none | Terminates the subscription without a refund. |
      tags:
        - subscriptions
      operationId: terminateSubscription
      parameters:
        - in: query
          name: refund
          schema:
            enum:
              - partial
              - full
              - none
            default: none
          description: >-
            `partial`, `full`, or `none` refund processed on the subscription
            charges.
        - in: query
          name: charge
          schema:
            type: boolean
            default: true
          description: >-
            Allowed if Usage-Based Billing Beta enabled on your site: If `true`,
            current billing cycle unbilled usage is billed on the final invoice.
            If `false`, Recurly will create a negative usage record for current
            billing cycle usage that will zero out the final invoice line items.
        - in: path
          name: uuid
          schema:
            type: string
          required: true
          description: Uuid.
      responses:
        '200':
          description: ''
          content:
            application/xml:
