          # Rate Limits
    In order to provide a fast response time to all our customers, we may rate
    limit excessive requests. By default, new Recurly sites have the following
    API rate limits:


    * Sandbox sites: 400 requests/min. All requests count towards the rate
    limit.

    * Production sites: 1,000 requests/min. Only GET and HEAD requests count
    towards the rate limit.


    Once your site moves into production mode, Recurly will only rate limit GET
    and HEAD requests. New subscriptions, account modifications, and other
    requests using POST, PUT, or DELETE methods will not count against your rate
    limit.


    The rate limit is calculated over a sliding 5 minute window. This means a
    production site could make 4,000 requests within one minute and not hit the
    rate limit so long as the site made less than 1,000 requests during the
    prior 4 minutes.


    When your site reaches its rate limit, your site technical contact will
    receive an email alerting them of the issue. This email will be sent not
    more than once every three hours. Our support team will also be notified.
    Please reach out to Recurly support if you need assistance in resolving this
    issue.


    If an API request exceeds the rate limit, the API returns a 429 status code
    indicating `Too Many Requests`. If your business needs a higher limit,
    please contact support.

    ##### HTTP Headers

    Every authenticated API request returns headers with your current rate limit
    information. Your requests' rate limit headers may look like:


    ```

    X-RateLimit-Limit: 5000

    X-RateLimit-Remaining: 4999

    X-RateLimit-Reset: 1414622019

    ```


    The `X-RateLimit-Limit` is your total request limit during the 5 minute
    window (e.g. requests/min * 5 min). The `X-RateLimit-Remaining` indicates
    the number of requests remaining until your requests will be denied.
    Finally, the `X-RateLimit-Reset` header contains a timestamp for when the
    current window will completely reset assuming no further API requests are
    made.
       # HTTP Status Codes
    **SUCCESSFUL STATUS CODES (2XX)**


    `200 OK`

    The request was successful.

    `201 Created`

    The resource was successfully created. Confirms a success when creating a
    new account, credit, subscription, etc.

    `204 No Content`

    The request was successful and there is no response body.


    **CLIENT ERROR STATUS CODES (4XX)**


    `400 Bad Request`

    The request was invalid or could not be understood by the server.
    Resubmitting the request will likely result in the same error. This commonly
    occurs when your XML is invalid, e.g. ampersands are not correctly encoded
    in the text of your request. Please inspect the body of the response for
    more details regarding the error.

    `401 Unauthorized`

    Your API key is missing or invalid.

    `402 Payment Required`

    Your Recurly account is in production mode but is not in good standing.
    Please pay any outstanding invoices.

    `403 Forbidden`

    The login is attempting to perform an action it does not have privileges to
    access. Verify your login credentials are for the appropriate account.

    `404 Not Found`

    The resource was not found with the given identifier. The response body will
    explain which resource was not found.

    `405 Method Not Allowed`

    The requested method is not valid at the given URL.

    `406 Not Acceptable`

    The request's Accept header is not set to application/xml.

    `412 Precondition Failed`

    The request was unsuccessful because a condition was not met. For example,
    this message may be returned if you attempt to cancel a subscription for an
    account that has no subscription.

    `422 Unprocessable Entity`

    Could not process a POST or PUT request because the request is invalid. See
    the response body for more details.

    `429 Too many Requests`

    You have made too many API requests in the last hour. Future API requests
    will be ignored until the beginning of the next hour.


    **SERVER ERROR STATUS CODES (5XX)**


    `500 Internal Server Error`

    The server encountered an error while processing your request and failed.

    `502 Gateway Error`

    The load balancer or web server has trouble connecting to the Recurly app.
    Please try the request again.

    `503 Service Unavailable`

    The service is temporarily unavailable. Please try the request again.


    **FUTURE COMPATIBILITY**


    For future compatibility, please interpret the following status code ranges:


    **200–299** as success,

    **400–499** as client request errors,

    **500–599** as server errors


    ##### 404 Not Found Responses

    When a lookup, update, or delete request is requested on an object that does
    not exist, the server returns `404 Not Found`:


    ```

    Status: 404 Not Found

    Content-Type: application/xml; charset=utf-8

    ```


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <error>
      <symbol>not_found</symbol>
      <description>The record could not be located.</description>
    </error>

    ```

    ##### 422 Unprocessable Entity Responses

    If the requested create, update, or delete cannot be performed due to
    validation errors, the server returns a `422 Unprocessable Entity` response
    with either an array of the validation errors or a single error:


    ```

    Status: 422 Unprocessable Entity

    Content-Type: application/xml; charset=utf-8

    ```


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <errors>
      <error field="model_name.field_name" symbol="not_a_number" lang="en-US">is not a number</error>
    </errors>

    ```


    ```

    <error>
      <symbol>simultaneous_request</symbol>
      <description>
        A change for subscription 3cf89f0c3fcda0b15c50134f63856d4e is already in progress.
      </description>
    </error>

    ```
        
