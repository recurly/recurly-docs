        <div class="alert alert--info" markdown="1">

        This feature must first be configured for your site via the admin
        console before exports are available for download via this endpoint. 
        More information about how to set up this feature is available in the
        product documentation - [Automated
        Exports](https://docs.recurly.com/docs/export-overview#section-automated-exports)

          * If the nightly data is not yet fully available for download, the endpoint will return a 404.  * If you are unsure of what data is available for download, this information is available via the  List Exports dates  (export_dates) and List Dates's exports (export_files) endpoints.  * The secure URL returned from this endpoint will be active for 60 minutes. After this time, a new authentication request must be sent.  * The secure URL returned from this endpoint will provide access to the requested individual export for the requested date.
        </div>
            
