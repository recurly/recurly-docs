    post:
      summary: Create Account
      description: |+
        Creates a new account. You may optionally include billing information.

      tags:
        - accounts
      operationId: createAccount
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              required:
                - account_code
              properties:
                account_code:
                  type: string
                  default: ''
                  description: >-
                    A unique identifier used by your application to identify the
                    account. This code may only contain the following
                    characters: [a-z 0-9 @ - _ .] but it may not begin with a
                    dot or hyphen character. Max of 50 characters.
                parent_account_code:
                  type: string
                  default: ''
                  description: >-
                    The account code of the new parent account. Allows
                    associating a new account to an existing account as its
                    child.
                bill_to:
                  type: string
                  default: self
                  description: >-
                    `self` or `parent`. Determines whether all charges are
                    billed using parent's billing information or the account
                    itself.  If bill_to = parent, all invoices resulting in
                    charges and credits originating from a child will be created
                    on the parent account. (e.g creating a subscription on the
                    child account will be billed to parent and invoiced on the
                    parent account)
                username:
                  type: string
                  default: ''
                  description: >-
                    The username for the account, ignore if you do not use
                    usernames. Max of 255 characters.
                email:
                  type: string
                  default: ''
                  description: The email address for the account.
                first_name:
                  type: string
                  default: ''
                  description: The first name for the account. Max of 255 characters.
                last_name:
                  type: string
                  default: ''
                  description: The last name for the account.  Max of 255 characters.
                company_name:
                  type: string
                  default: ''
                  description: The company name for the account. Max of 50 characters.
                vat_number:
                  type: string
                  default: ''
                  description: >-
                    The VAT number to avoid having the VAT applied (if
                    applicable).
                tax_exempt:
                  type: boolean
                  default: ''
                  description: The tax status for the account.
                exemption_certificate:
                  type: string
                  default: ''
                  description: >-
                    Optional field for merchants taxing through Vertex. String
                    of 1-30 characters. If an exemption_certificate is provided,
                    tax_exempt must be true.
                entity_use_code:
                  type: string
                  default: ''
                  description: >-
                    The Avalara AvaTax value that can be passed to identify the
                    customer type for tax purposes. The range of values can be A
                    - R (more info at Avalara). Value is case-sensitive.
                account_acquisition:
                  type: object
                  default: ''
                  description: >-
                    The nested account acquisition information: `cost_in_cents`,
                    `currency`, `channel`, `subchannel`, `campaign`
                billing_info:
                  type: object
                  default: ''
                  description: >-
                    The nested billing information. If present, the account will
                    only be created after the billing information is validated.
                address:
                  type: object
                  default: ''
                  description: >-
                    The nested address information for the account: `address1`,
                    `address2`, `city`, `state`, `zip`, `country`, `phone`.
                shipping_address:
                  type: object
                  default: ''
                  description: >-
                    The nested shipping address information of the account:
                    `first_name`, `last_name`, `company_name`, `email`, `phone`,
                    `vat_number`,  `address1`, `address2`, `city`, `state`,
                    `zip`, `country`, `nickname`. You can pass in up to 20
                    account shipping addresses along with the request to create
                    a new account. When providing a shipping address, the
                    following are required: first_name, last_name, address1,
                    city, state, zip, and country.
                accept_language:
                  type: string
                  default: ''
                  description: >-
                    The ISO 639-1 language code from the user's browser,
                    indicating their preferred language and locale.
                cc_emails:
                  type: string
                  default: ''
                  description: >-
                    Additional email address that should receive account
                    correspondence. These should be separated only by commas.
                    These CC emails will receive all emails that the `email`
                    field also receives.
                preferred_locale:
                  type: string
                  default: ''
                  description: >-
                    Used to determine the language and locale of emails sent on
                    behalf of the merchant to the customer. The list of locales
                    is restricted to those the merchant has enabled on the site.
                preferred_time_zone:
                  type: string
                  default: ''
                  description: >-
                    Used to determine the time zone of emails sent on behalf of
                    the merchant to the customer. Must be a [supported IANA time
                    zone
                    name](https://docs.recurly.com/docs/email-time-zones-and-time-stamps#supported-api-iana-time-zone-names)
                transaction_type:
                  type: string
                  default: ''
                  description: >-
                    Indicates type of resulting transaction. accepted_values:
                    "moto".
                invoice_template_uuid:
                  type: string
                  title: Invoice Template UUID
                  description: >-
                    Unique ID to identify an invoice template.  Available when
                    the site is on a Pro or Elite plan.  Used to specify which
                    invoice template, if any, should be used to generate
                    invoices for the account.
                dunning_campaign_id:
                  type: string
                  title: Dunning Campaign ID
                  description: >-
                    Unique ID to identify a dunning campaign. Used to specify if
