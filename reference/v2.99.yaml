  /invoices/{invoice_number}/refund:
    post:
      summary: Refund/Void Line Items
      description: >
        Apply a refund to one or more individual line items on an invoice. A
        line item can be refunded by a quantity amount, a specific dollar/cent
        amount, or a percentage amount and will only apply to the specific line
        item you are aiming to refund.

        * Note: You must have the Credit Memos feature flag enabled on your site
        to utilize specific dollar/cent amount and percentage amount refunds on
        line items.


        <div class="alert alert--warning" markdown="1">

        An invoice with a processed line item refund cannot accept

        refunds of an open amount.



        This endpoint will not void an ACH bank account transaction. ACH

        voids are only allowed through the UI.

        </div>
      tags:
        - invoices
      operationId: refundVoidLineItems
      parameters:
        - in: path
          name: invoice_number
          schema:
            type: string
            default: ''
          required: true
          description: Invoice number
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              required:
                - uuid
              properties:
                uuid:
                  type: string
                  default: ''
                  description: Adjustment's unique identifier.
                quantity:
                  type: integer
                  default: ''
                  description: >-
                    Quantity to refund. Must be less than or equal to the
                    `quantity_remaining`. If `quantity_decimal`,
                    `amount_in_cents`, and `percentage` are not present,
                    `quantity` is required. If `amount_in_cents`, or
                    `percentage` is present, `quantity` must be absent.
                quantity_decimal:
                  type: string
                  default: ''
                  description: >-
                    Decimal quantity to refund. The `quantity_decimal` will be
                    used to refund charges that has a NOT null quantity decimal.
                    Must be less than or equal to the
                    `quantity_decimal_remaining`. If `quantity`,
                    `amount_in_cents`, and `percentage` are not present,
                    `quantity_decimal` is required. If `amount_in_cents` or
                    `percentage` is present, `quantity_decimal` must be absent.
                    The Decimal Quantity feature must be enabled to utilize this
                    field.
                amount_in_cents:
                  type: integer
                  default: ''
                  description: >-
                    The specific amount to be refunded from the adjustment. Must
                    be less than or equal to the adjustment's remaining balance.
                    If `quantity`, `quantity_decimal`, and `percentage` are not
                    present, `amount_in_cents` is required. If `quantity`,
                    `quantity_decimal`, or `percentage` is present,
                    `amount_in_cents` must be absent.
                percentage:
                  type: integer
                  default: ''
                  description: >-
                    The percentage of the adjustment's remaining balance to
                    refund. If `quantity`, `quantity_decimal`, and
                    `amount_in_cents` are not present, `percentage` is required.
                    If `quantity`, `quantity_decimal`, or `amount_in_cents` is
                    present, `percentage` must be absent.
                  minimum: 1
                  maximum: 100
                prorate:
                  type: boolean
                  default: ''
                  description: >-
                    Toggle to prorate the line item to refund. Set as `true` or
                    `false`. Only applicable to subscription line items still in
                    the current billing cycle. Proration is not allowed on
                    invoices with an associated transaction that has not
                    settled, due to the full amount needed in order to void the
                    transaction.
                refund_method:
                  type: string
                  default: credit_first
                  description: >-
                    If credit line items exist on the invoice, this parameter
                    specifies which refund method to use first. Most relevant in
                    a partial refunds, you can chose to refund credit back to
                    the account first or a transaction giving money back to the
                    customer first. If not specified, the default is credit back
                    to the account. Set as `credit_first`, `transaction_first`,
                    `all_transaction`, or `all_credit`.
                external_refund:
                  type: boolean
                  default: ''
                  description: Designates that the refund transactions created are manual.
                credit_customer_notes:
                  type: string
                  default: ''
                  description: Adds notes to refund credit invoice.
                payment_method:
                  type: string
                  default: ''
                  description: >-
                    Creates the manual transactions with this payment method.
                    Allowed if `external_refund` is true.
                description:
                  type: string
                  default: ''
                  description: >-
                    Sets this value as the `transaction_note` on the manual
                    transactions created. Allowed if `external_refund` is true.
                refunded_at:
                  type: string
                  default: ''
                  description: >-
                    Sets this value as the `collected_at` on the manual
                    transactions created. Allowed if `external_refund` is true.
      responses:
        '201':
          description: ''
          content:
