  /coupons/{coupon_code}/redeem:
    post:
      summary: Redeem Coupon on Account
      description: >-
        Redeem a coupon on an existing customer's account to apply to their next
        invoice.




        <div class="alert alert--danger" markdown="1">

        If you want the coupon redemption to be rejected if a subscription
        signup fails, you must redeem the coupon within the Create Subscription
        call, not in the Redeem on Account call.

        </div>


        ##### Redeeming Multiple Coupons

        If you have Multiple Coupons Per Account enabled in Coupon Settings, you
        can have multiple active redemptions on an account. Call this redeem
        endpoint multiple times to redeem more than one coupon.

        ##### Maxed Out Error

        If a coupon can only be redeemed on an account a specific number of
        times and you have already redeemed the coupon that number of times on
        the account, you will see a maxed out error letting you know the coupon
        can no longer be redeemed on the account.


        ```

        <errors>
            <error field="coupon.base" symbol="maxed_out_for_account">Coupon has reached max redemptions for this account</error>
        </errors>

        ```

         The only way you would be able to redeem this coupon again on the account would be to update the main coupon campaign to allow more redemptions per account.
        ##### Subscription-Level Redemption

        If the coupon is subscription-level, meaning it has a
        redemption_resource of "subscription", you must specify the
        subscription_uuid of an existing subscription on the account that you
        want to tie the redemption to. Otherwise you will get this error:


        ```

        <errors>
            <error field="coupon.subscription" symbol="must_be_present">must be redeemed on a subscription</error>
        </errors>

        ```


        If the subscription_uuid you provide is for a subscription with a plan
        not eligible for the coupon, you will see this error:


        ```

        <errors>
            <error field="coupon.subscription_uuid" symbol="not_valid_for_redemption">not valid for this coupon</error>
        </errors>

        ```
      tags:
        - coupon-redemptions
      operationId: redeemCouponOnAccount
      parameters:
        - in: path
          name: coupon_code
          schema:
            type: string
            default: ''
          required: true
          description: Unique code to identify and redeem the coupon.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              required:
                - account_code
                - currency
              properties:
                account_code:
                  type: integer
                  default: ''
                  description: Account code to apply redemption
                currency:
                  type: string
                  default: ''
                  description: Currency for the redemption.
                subscription_uuid:
                  type: string
                  default: ''
                  description: >-
                    If the coupon has a `redemption_resource` of `subscription`,
                    you will need to specify the uuid of an existing
                    subscription on the account, which you want to tie the
                    redemption to.
      responses:
        '201':
          description: ''
          content:
            application/xml:
              example: >-
                <redemption
                href="https://your-subdomain.recurly.com/v2/accounts/1/redemptions/374a1c75374bd81493a3f7425db0a2b8">
                  <coupon href="https://your-subdomain.recurly.com/v2/coupons/special" />
                  <account href="https://your-subdomain.recurly.com/v2/accounts/1" />
                  <uuid>374a1c75374bd81493a3f7425db0a2b8</uuid>
                  <single_use type="boolean">true</single_use>
                  <total_discounted_in_cents type="integer">0</total_discounted_in_cents>
                  <currency>USD</currency>
                  <state>active</state>
                  <coupon_code>special</coupon_code>
                  <created_at type="datetime">2016-07-11T18:56:20Z</created_at>
                  <updated_at type="datetime">2016-07-11T18:56:20Z</updated_at>
                </redemption>
              schema:
                $ref: '#/components/schemas/Redemption'
        '400':
          description: Expired/Invalid
          content:
            application/xml:
              example: |-
                <error>
                    <symbol>not_found</symbol>
                    <description lang="en-US">Couldn't find Coupon with coupon_code = savemore</description>
                </error>
      x-codeSamples:
        - lang: xml
          source: |-
            <redemption>
              <account_code>1</account_code>
              <currency>USD</currency>
            </redemption>
        - lang: PHP
          source: |-
            <?php

            $coupon = Recurly_Coupon::get('special');
            $redemption = $coupon->redeemCoupon('1', 'USD');
        - lang: Ruby
          source: |-
            account = Recurly::Account.find('1')
            coupon = Recurly::Coupon.find('special')
            redemption = coupon.redeem(account)
        - lang: Python
          source: >-
            coupon = Coupon.get('special')

            redemption = Redemption(account_code='1', currency='USD')


            # new redemption object returned from this method will contain the
            updates

            # so we overwrite the redemption variable

            redemption = coupon.redeem(redemption)
        - lang: Dotnet
          source: |-
            var account = Accounts.Get("1");
            var redemption = account.RedeemCoupon("special", "USD");
