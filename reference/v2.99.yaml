      properties:
        id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        code:
          $ref: '#/components/schemas/GeneralLedgerAccountCode'
        description:
          $ref: '#/components/schemas/GeneralLedgerAccountDescription'
        account_type:
          $ref: '#/components/schemas/GeneralLedgerAccountTypeEnum'
        created_at:
          type: string
          format: date-time
          title: Created at
          readOnly: true
        updated_at:
          type: string
          format: date-time
          title: Last updated at
          readOnly: true
      xml:
        name: general_ledger_account
    GeneralLedgerAccountsList:
      type: array
      items:
        $ref: '#/components/schemas/GeneralLedgerAccount'
      xml:
        name: general_ledger_accounts
    GeneralLedgerAccountCreate:
      type: object
      description: Create a new liability or revenue general ledger account.
      properties:
        code:
          $ref: '#/components/schemas/GeneralLedgerAccountCode'
        description:
          $ref: '#/components/schemas/GeneralLedgerAccountDescription'
        account_type:
          $ref: '#/components/schemas/GeneralLedgerAccountTypeEnum'
      required:
        - account_type
        - code
      xml:
        name: general_ledger_account
    GeneralLedgerAccountUpdate:
      type: object
      description: Update an existing general ledger account.
      properties:
        code:
          $ref: '#/components/schemas/GeneralLedgerAccountCode'
        description:
          $ref: '#/components/schemas/GeneralLedgerAccountDescription'
      xml:
        name: general_ledger_account
    GiftCard:
      type: object
      properties:
        gifter_account:
          type: string
          description: The URL of the account that purchased the gift card.
        invoice:
          type: string
          description: >-
            The URL of the invoice for the gift card purchase by the
            `gifter_account`.
        recipient_account:
          type: string
          description: >-
            The URL of the account that redeemed the gift card redemption code.
            Does not show until gift card is redeemed.
        id:
          type: integer
          format: int64
          description: The unique id of the gift card.
        redemption_code:
          type: string
          description: >-
            The unique redemption code for the gift card, generated by Recurly.
            Will be 16 characters, alphanumeric, displayed uppercase, but
            accepted in any case at redemption. Used by the `recipient_account`
            to create a credit in the amount of the `unit_amount_in_cents` on
            their account.
        balance_in_cents:
          type: integer
          description: >-
            The remaining credit on the `recipient_account` associated with this
            gift card. Only shows once the gift card has been redeemed. Can be
            used to create gift card balance displays for your customers.
        currency:
          type: string
          description: The currency of the `unit_amount_in_cents` and `balance_in_cents`.
        product_code:
          type: string
          description: The product code or SKU of the gift card product.
        unit_amount_in_cents:
          type: integer
          description: >-
            The amount of the gift card, which is the amount of the charge to
            the `gifter_account` and the amount of credit that is applied to the
            `recipient_account` upon successful redemption.
        delivery:
          type: object
          description: >-
            Block of delivery information. Includes the params `method` through
            `personal_message` below.
        method:
          type: string
          description: Whether the delivery method is `email` or `post`.
        deliver_at:
          type: string
          format: date-time
          description: >-
            When the gift card should be delivered to the recipient. If null,
            the gift card will be delivered immediately. If a datetime is
            provided, the delivery will be in an hourly window, rounding down.
            For example, 6:23 pm will be in the 6:00 pm hourly batch.
        email_address:
          type: string
          description: The email address of the recipient.
        first_name:
          type: string
          description: The first name of the recipient.
        last_name:
          type: string
          description: The last name of the recipient.
        address:
          type: object
          description: >-
            Block of address information for the recipient. Includes the params
            `address1` through `phone` below.
        address1:
          type: string
          description: The first street address line of the recipient.
        address2:
          type: string
          description: The second street address line of the recipient.
        city:
          type: string
          description: The city of the recipient.
        state:
          type: string
          description: The state/province of the recipient.
        zip:
          type: string
          description: The zip/postal code of the recipient.
        country:
          type: string
          description: The country of the recipient.
        phone:
          type: string
          description: The phone number of the recipient.
        gifter_name:
          type: string
          description: >-
            The name of the gifter for the purpose of message displays to the
            recipient.
        personal_message:
          type: string
          description: >-
            The personal message from the gifter to the recipient. 255
            characters.
        liability_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        revenue_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        performance_obligation_id:
          $ref: '#/components/schemas/PerformanceObligationId'
        created_at:
          type: string
          format: date-time
          description: When the gift card was purchased.
        updated_at:
          type: string
          format: date-time
          description: >-
            When the gift card object was updated, which happens upon purchase,
            delivery and redemption.
        delivered_at:
          type: string
          format: date-time
          description: >-
            When the gift card was sent to the recipient by Recurly via email,
            if method was email and the "Gift Card Delivery" email template was
            enabled. This will be empty for post delivery or email delivery
            where the email template was disabled.
        redeemed_at:
          type: string
          format: date-time
          description: When the gift card was redeemed by the recipient.
        canceled_at:
          type: string
          format: date-time
          description: When the gift card was canceled.
        purchase_invoice:
          type: string
          description: >-
            The URL of the charge invoice for the gift card redemption. If gift
            cards enabled, this link should be used over the `invoice` link.
        redemption_invoice:
          type: string
          description: The URL of the credit invoice for the gift card purchase.
    GiftCardRedemption:
      type: object
      properties:
        gift_card:
          type: object
          description: >-
            The gift card object is required in order to redeem a redemption
            code.
          properties:
            redemption_code:
              type: string
              default: ''
              description: The redemption code for the gift card being redeemed.
              example: JHD776JENN99E6DD
      xml:
        name: gift_card
    InvoiceCollection:
      type: array
      items:
        type: object
    InvoiceTemplate:
      type: object
      properties:
        uuid:
          type: string
          description: >-
            Unique ID to identify an invoice template.  Available when the site
            is on a Pro or Elite plan.  Used to specify which invoice template,
            if any, should be used to generate invoices for the account.
        name:
          type: string
          description: Invoice template name.
        code:
          type: string
          description: Invoice template's unique code.
        description:
          type: string
          description: Invoice template description.
        created_at:
          type: string
          format: date-time
          description: When the invoice template was created in Recurly.
        updated_at:
          type: string
          format: date-time
          description: When the invoice template was updated in Recurly.
    MeasuredUnit:
      type: object
      properties:
        id:
          type: integer
          description: Unique id of the measured unit on your site.
        name:
          type: string
          description: Unique internal name of the measured unit on your site.
        display_name:
          type: string
          description: >-
            Display name for the measured unit. We recommend the singular
            version. (e.g. - GB, API Call, Email).
        description:
          type: string
          description: Optional internal description.
    OriginTaxAddressSourceEnum:
      type: string
      title: Origin tax address source
      description: >-
        The source of the address that will be used as the origin in determining
        taxes. Available only when the site is on an Elite plan. A value of
        "origin" refers to the "Business entity tax address". A value of
        "destination" refers to the "Customer tax address".
      default: origin
      enum:
        - origin
        - destination
    PerformanceObligation:
      type: object
      description: Performance obligation details
      properties:
        id:
          $ref: '#/components/schemas/PerformanceObligationId'
        name:
          title: Performance Obligation Name
          type: string
        created_at:
          title: Created At
          type: string
          readOnly: true
          format: date-time
        updated_at:
          title: Last updated at
          type: string
          readOnly: true
          format: date-time
      xml:
        name: performance_obligation
    PerformanceObligationList:
      type: array
      description: List of Performance Obligations
      items:
        $ref: '#/components/schemas/PerformanceObligation'
      xml:
        name: performance_obligations
    PlanFixedPricingProperties:
      type: object
      properties:
        unit_amount_in_cents:
          $ref: '#/components/schemas/Currencies'
        pricing_model:
          $ref: '#/components/schemas/PricingModelTypeEnum'
    PlanRampPricingProperties:
      type: object
      properties:
        ramp_intervals:
          type: array
          maxItems: 12
          items:
            $ref: '#/components/schemas/PlanRampInterval'
        pricing_model:
          $ref: '#/components/schemas/PricingModelTypeEnum'
    Plan:
      type: object
      oneOf:
        - $ref: '#/components/schemas/PlanFixedPricing'
        - $ref: '#/components/schemas/PlanRampPricing'
      discriminator:
        propertyName: pricing_model
        mapping:
          fixed: '#/components/schemas/PlanFixedPricing'
          ramp: '#/components/schemas/PlanRampPricing'
    PlanBase:
      allOf:
        - $ref: '#/components/schemas/PlanUpdateBase'
        - type: object
          properties:
            plan_interval_unit:
              type: string
              default: months
              description: '`days`, or `months`, defaults to `months`.'
            plan_interval_length:
              type: integer
              default: '1'
              description: Plan interval length, defaults to `1`
    PlanFixedPricing:
      allOf:
        - $ref: '#/components/schemas/PlanMini'
        - $ref: '#/components/schemas/PlanFixedPricingProperties'
        - $ref: '#/components/schemas/PlanBase'
    PlanFixedPricingRequest:
      allOf:
        - $ref: '#/components/schemas/PlanFixedPricing'
        - required:
            - plan_code
            - name
            - unit_amount_in_cents
    PlanMini:
      type: object
      properties:
        plan_code:
          $ref: '#/components/schemas/PlanCode'
        name:
          type: string
          default: ''
          maxLength: 255
          description: Plan name. Max of 255 characters.
          example: Gold Plan
    PlanRampInterval:
      type: object
      title: Plan Ramp Interval
      properties:
        starting_billing_cycle:
          $ref: '#/components/schemas/RampIntervalStartingBillingCycle'
        unit_amount_in_cents:
          $ref: '#/components/schemas/Currencies'
    PlanRampPricing:
      allOf:
        - $ref: '#/components/schemas/PlanMini'
        - $ref: '#/components/schemas/PlanRampPricingProperties'
        - $ref: '#/components/schemas/PlanBase'
    PlanRampPricingRequest:
      allOf:
        - $ref: '#/components/schemas/PlanRampPricing'
        - required:
            - plan_code
            - name
            - ramp_intervals
    PlanRequest:
      type: object
      oneOf:
        - $ref: '#/components/schemas/PlanFixedPricingRequest'
        - $ref: '#/components/schemas/PlanRampPricingRequest'
      discriminator:
        propertyName: pricing_model
        mapping:
          fixed: '#/components/schemas/PlanFixedPricingRequest'
          ramp: '#/components/schemas/PlanRampPricingRequest'
    PlanUpdate:
      type: object
      oneOf:
        - $ref: '#/components/schemas/PlanUpdateFixedPricing'
        - $ref: '#/components/schemas/PlanUpdateRampPricing'
      discriminator:
        propertyName: pricing_model
        mapping:
          fixed: '#/components/schemas/PlanUpdateFixedPricing'
          ramp: '#/components/schemas/PlanUpdateRampPricing'
    PlanUpdateBase:
      type: object
      properties:
        description:
          type: string
          default: ''
          description: Optional plan description, not displayed.
        trial_interval_unit:
          type: string
          default: days
          description: '`days` or `months`, defaults to `days`.'
        trial_interval_length:
          type: integer
          default: '0'
          description: Defaults to `0`, for no trial
        trial_requires_billing_info:
          type: boolean
          default: ''
          description: >-
            Allow free trial subscriptions to be created without billing info.
            Should not be used if billing info is needed for initial invoice due
            to existing uninvoiced charges or setup fee.
        success_url:
          type: string
          default: ''
          description: URL to redirect to after signup on the hosted payment pages.
        accounting_code:
          type: string
          default: ''
          description: >-
            Accounting code for related invoice line items, code may only
            contain the following characters: [a-z 0-9 @ - _ .]. Max of 20
            characters.
        revenue_schedule_type:
          type: string
          default: evenly
          description: >-
            Optional field for setting a revenue schedule type. This will
            determine how revenue for the associated Plan should be recognized.
            When creating a Plan, available schedule types are `never`,
            `evenly`, `at_range_start`, or `at_range_end`.
        liability_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        revenue_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        performance_obligation_id:
          $ref: '#/components/schemas/PerformanceObligationId'
        setup_fee_accounting_code:
          type: string
          default: ''
          description: >-
            Accounting code for a Setup Fee, code may only contain the following
            characters: [a-z 0-9 @ - _ .]. Max of 20 characters.
        setup_fee_revenue_schedule_type:
          type: string
          default: evenly
          description: >-
            Optional field for setting a revenue schedule type. This will
            determine how revenue for the associated Plan Setup Fee should be
            recognized. When creating a Plan Setup Fee, available schedule types
            are `never`, `evenly`, `at_range_start`, or `at_range_end`.
        setup_fee_liability_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        setup_fee_revenue_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        setup_fee_performance_obligation_id:
          $ref: '#/components/schemas/PerformanceObligationId'
        setup_fee_in_cents:
          $ref: '#/components/schemas/Currencies'
        total_billing_cycles:
          type: integer
          default: ''
          description: >-
            Number of billing cycles before the plan stops renewing, defaults to
            `null` for continuous auto renewal.
        unit_name:
          type: string
          default: ''
          description: '*Deprecated* Unit description for the quantity, e.g. users.'
        display_quantity:
          type: boolean
          default: 'false'
          description: >-
            Display the quantity field on the hosted payment page if `true`,
            defaults to `false`.
        cancel_url:
          type: string
          default: ''
          description: >-
            *Deprecated* URL to redirect to on canceled signup on the hosted
            payment pages.
        tax_exempt:
          type: boolean
          default: ''
          description: >-
            `true` exempts tax on the plan, `false` applies tax on the plan. If
            not defined, then defaults to the Plan and Site settings.
        tax_code:
          type: string
          maxLength: 50
          title: Tax code
          description: >-
            Optional field used by Avalara, Vertex, and Recurly's In-the-Box tax
            solution to determine taxation rules. You can pass in specific tax
            codes using any of these tax integrations. For Recurly's In-the-Box
            tax offering you can also choose to instead use simple values of
            `unknown`, `physical`, or `digital` tax codes.
        auto_renew:
          type: boolean
          default: true
          description: >-
            Determines whether subscriptions to this plan should auto-renew term
            at the end of the current term or expire.
        bypass_hosted_confirmation:
          type: boolean
          default: ''
          description: >-
            If `true`, the customer will be sent directly to your `success_url`
            after a successful signup, bypassing Recurly's hosted confirmation
            page.
        allow_any_item_on_subscriptions:
          type: boolean
          default: false
          description: >-
            Used to determine whether items can be assigned as add-ons to
            individual subscriptions. If `true`, items can be assigned as
            add-ons to individual subscription add-ons. If `false`, only plan
            add-ons can be used.
        vertex_transaction_type:
          allOf:
            - $ref: '#/components/schemas/VertexTransactionTypeEnum'
          default: sale
        dunning_campaign_id:
          type: string
          default: ''
          description: >-
            Unique ID to identify a dunning campaign. Available when the Dunning
            Campaigns feature is enabled. Used to specify if a non-default
            dunning campaign should be assigned to this plan. For sites without
            multiple dunning campaigns enabled, the default dunning campaign
            will always be used.
        custom_fields:
          $ref: '#/components/schemas/CustomFields'
    PlanUpdateFixedPricing:
      allOf:
        - $ref: '#/components/schemas/PlanMini'
        - $ref: '#/components/schemas/PlanFixedPricingProperties'
        - $ref: '#/components/schemas/PlanUpdateBase'
    PlanUpdateRampPricing:
      allOf:
        - $ref: '#/components/schemas/PlanMini'
        - $ref: '#/components/schemas/PlanRampPricingProperties'
        - $ref: '#/components/schemas/PlanUpdateBase'
    PreconditionFailedError:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            type:
              title: Type
              type: string
              default: precondition_failed
    PurchaseBase:
      type: object
      required:
        - account
        - adjustments
        - currency
      properties:
        account:
          type: object
          default: ''
          description: >-
            An account object. This can be an existing account or a new account.
            If using a new account and adding shipping addresses, the last
            shipping address in the list will apply to every subscription and
            adjustment in the purchase.
        billing_info_uuid:
          $ref: '#/components/schemas/BillingInfoUuid'
        adjustments:
          type: array
          default: ''
          description: >-
            This should be a list of Adjustment objects. Required if there are
            no subscriptions.
          items:
            $ref: '#/components/schemas/AdjustmentCreate'
        collection_method:
          $ref: '#/components/schemas/CollectionMethodEnum'
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        net_terms:
          $ref: '#/components/schemas/NetTerms'
        net_terms_type:
          $ref: '#/components/schemas/NetTermsTypeEnum'
        gift_card:
          $ref: '#/components/schemas/GiftCardRedemption'
        coupon_codes:
          $ref: '#/components/schemas/CouponCodes'
        subscriptions:
          type: array
          default: ''
          description: >-
            A list of Subscriptions to invoice in this purchase. Required if
            there are no adjustments.
          items:
            oneOf:
              - $ref: '#/components/schemas/SubscriptionRequest'
              - $ref: '#/components/schemas/SubscriptionRequestWithFeatures'
        shipping_address_id:
          $ref: '#/components/schemas/ShippingAddressId'
        shipping_address:
          $ref: '#/components/schemas/ShippingAddress'
        shipping_fees:
          $ref: '#/components/schemas/ShippingFees'
        gateway_code:
          $ref: '#/components/schemas/GatewayCode'
        transaction_type:
          $ref: '#/components/schemas/TransactionTypeEnum'
        po_number:
          $ref: '#/components/schemas/PoNumber'
        customer_notes:
          $ref: '#/components/schemas/CustomerNotes'
        terms_and_conditions:
          $ref: '#/components/schemas/TermsAndConditions'
        transaction:
          type: object
          description: >-
            (Transaction Data, Card on File) - Options for flagging transactions
            as Customer or Merchant Initiated Unscheduled.
          allOf:
            - type: object
              properties:
                initiator:
                  $ref: '#/components/schemas/Transaction/properties/initiator'
                merchant_reason_code:
                  $ref: >-
                    #/components/schemas/Transaction/properties/merchant_reason_code
        vat_reverse_charge_notes:
          $ref: '#/components/schemas/VatReverseChargeNotes'
        vertex_transaction_type:
          $ref: '#/components/schemas/VertexTransactionTypeEnum'
    Purchase:
      allOf:
        - $ref: '#/components/schemas/PurchaseBase'
      xml:
        name: purchase
    Question:
      type: object
      title: Question
      properties:
        id:
          type: string
          title: Question ID
          readOnly: true
        object:
          type: string
          title: Object type
          readOnly: true
          example: question
        version_id:
          type: string
          title: QuestionVersion ID
          readOnly: true
          description: The ID of the most question version being presented
        question_number:
          type: string
          title: Question Number
          description: Referenceable number for the Question
        description:
          type: string
          title: Question description
        created_at:
          type: string
          format: date-time
          title: Created at
          readOnly: true
        updated_at:
          type: string
          format: date-time
          title: Last updated at
          readOnly: true
        response_choices:
          type: array
          title: Response Choices
          items:
            $ref: '#/components/schemas/ResponseChoice'
    Redemption:
      type: object
      properties:
        account_code:
          type: string
          description: ''
        redemption_uuid:
          type: string
          description: ''
        coupon:
          type: string
          description: The link to the coupon used
        account:
          type: string
          description: The link to the account
        subscription:
          type: string
          description: >-
            The link to the subscription (only available if redeemed on a
            subscription)
        uuid:
          type: string
          description: The unique UUID referencing this redemption.
        single_use:
          type: boolean
          description: True if this is a single_use coupon
        total_discounted_in_cents:
          type: integer
          description: Total in cents for the discount issued with this redemption
        currency:
          type: string
          description: The currency used at the time of purchase
        state:
          type: string
          description: The state of the redemption. Can be `active` or `inactive`
        coupon_code:
          type: string
          description: The coupon code of the coupon used
        created_at:
          type: string
          format: date-time
          description: The datetime this redemption was created
        updated_at:
          type: string
          description: The datetime this redemption was last updated
    ReferenceAccount:
      type: object
      properties:
        href:
          $ref: '#/components/schemas/ReferenceHref'
      xml:
        name: account
    ReferenceBillingInfo:
      type: object
      properties:
        href:
          $ref: '#/components/schemas/ReferenceHref'
      xml:
        name: billing_info
    ReferenceInvoice:
      type: object
      properties:
        href:
          $ref: '#/components/schemas/ReferenceHref'
      xml:
        name: invoice
    ReferencePlan:
      type: object
      properties:
        href:
          $ref: '#/components/schemas/ReferenceHref'
      xml:
        name: plan
    ReferenceRedemptions:
      type: object
      properties:
        href:
          $ref: '#/components/schemas/ReferenceHref'
      xml:
        name: redemptions
    ReferenceShippingAddress:
      type: object
      properties:
        href:
          $ref: '#/components/schemas/ReferenceHref'
      xml:
        name: shipping_address
    ResponseChoice:
      type: object
      title: Response Choice
      properties:
        id:
          type: string
          title: Response Choice ID
          readOnly: true
        object:
          type: string
          title: Object type
          example: response_choice
          readOnly: true
        version_id:
          type: string
          title: Response Choice Version ID
          readOnly: true
          description: The ID of the most response choice version being presented
        response_choice_number:
          type: string
          title: Response Choice Number
          description: Referenceable number for the Response Choice
        description:
          type: string
          title: Response choice description
        created_at:
          type: string
          format: date-time
          title: Created at
          readOnly: true
        updated_at:
          type: string
          format: date-time
          title: Last updated at
          readOnly: true
    ShippingAddress:
      allOf:
        - $ref: '#/components/schemas/AddressWithName'
        - type: object
          required:
            - first_name
            - last_name
            - address1
            - city
            - state
            - zip
            - country
          description: |-
            Optional nested object to use if you want to create a new shipping
            address on a new subscription/account. The nested object contains
            the information for the account shipping address:
            `first_name`, `last_name`, `company_name`, `email`, `phone`,
            `vat_number`,  `address1`, `address2`, `city`, `state`,
            `zip`, `country`, `nickname`. When providing a shipping
            address, the following are required: first_name, last_name,
            address1, city, state, zip, and country. Required if using
            `shipping_method_code` and no `shipping_address_id` is
            specified.
          properties:
            first_name:
              description: The first name for the account. Max of 255 characters.
            last_name:
              description: The last name for the account.  Max of 255 characters.
            phone:
              description: The phone number for the shipping address.
            address1:
              description: Address line 1.
            address2:
              description: Address line 2.
            city:
              description: City
            state:
              description: State or region
            zip:
              description: Zip or postal code
            country:
              description: >-
                Country,  [2-letter ISO
                code](http://www.iso.org/iso/country_names_and_code_elements).
            nickname:
              type: string
              description: >-
                A nickname for the shipping address. Defaults to "first_name
                last_name". Max of 255 characters.
              maxLength: 255
              default: ''
              example: Work
            company:
              type: string
              description: The company name for the shipping address. Max of 50 characters.
              maxLength: 50
              example: Recurly Inc
              default: ''
            email:
              allOf:
                - $ref: '#/components/schemas/Email'
                - description: The email address for the shipping address.
            vat_number:
              type: string
              description: >-
                Customer's VAT number (to avoid having VAT applied, if
                applicable).
              default: ''
              maxLength: 20
    ShippingFee:
      type: object
      properties:
        shipping_method_code:
          type: string
          description: The code of the shipping method.
        shipping_amount_in_cents:
          type: integer
          description: The amount of the shipping fee in cents.
      xml:
        name: shipping_fee
    ShippingFees:
      type: array
      default: ''
      description: >-
        Array of `<shipping_fee>` objects, each containing a
        `shipping_method_code` and a `shipping_amount_in_cents`.
      items:
        $ref: '#/components/schemas/ShippingFee'
      xml:
        name: shipping_fees
    SubscriptionBase:
      type: object
      title: Subscription
      xml:
        name: subscription
    SubscriptionBasicResponse:
      title: Subscription (Basic Features)
      allOf:
        - $ref: '#/components/schemas/SubscriptionBase'
        - type: object
          properties:
            href:
              $ref: '#/components/schemas/ReferenceHref'
            account:
              $ref: '#/components/schemas/ReferenceAccount'
            invoice:
              $ref: '#/components/schemas/ReferenceInvoice'
        - $ref: '#/components/schemas/SubscriptionSharedReferences'
        - $ref: '#/components/schemas/SubscriptionSharedResponseProperties'
        - $ref: '#/components/schemas/SubscriptionReferenceAnchors'
    SubscriptionCommonFields:
      type: object
      properties:
        uuid:
          type: string
          title: UUID
          description: >-
            The UUID is useful for matching data with the CSV exports and
            building URLs into Recurly's UI.
          maxLength: 32
          example: 374ae5e848adcfd332fdd3469d89c888
        state:
          $ref: '#/components/schemas/SubscriptionStateEnum'
        unit_amount_in_cents:
          type: integer
          maximum: 10000000
          minimum: 0
          description: >-
            Override the unit amount of the subscription plan by setting this
            value in cents. If not provided, the subscription will inherit the
            price from the subscription plan for the provided currency. Max
            10000000.
        currency:
          type: string
          description: 3-Letter currency code for the subscription.
          example: USD
        quantity:
          type: integer
          default: 1
          minimum: 1
          description: Optionally override the default quantity of 1.
        activated_at:
          type: string
          format: date-time
        canceled_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        total_billing_cycles:
          type: integer
          description: The total number of billing cycles for the current subscription term
          minimum: 1
        remaining_billing_cycles:
          type: integer
          description: >-
            The number of billing periods that are left in the subscription. `1`
            means the subscription renew one more time and then expire. 
            Decrements from the total number of billing periods in the current
            term. Will always be 0 if total billing cycles is 1.
          minimum: 0
        current_period_started_at:
          type: string
          format: date-time
        current_period_ends_at:
          type: string
          format: date-time
        trial_started_at:
          type: string
          format: date-time
        trial_ends_at:
          type: string
          format: date-time
          description: >-
            If set, overrides the default trial behavior for the subscription.
            This must be a date and time, preferably in UTC. If the date is in
            the past, the subscription will skip the trial.
        terms_and_conditions:
          type: string
          description: >-
            Optional notes field. This will default to the Terms and Conditions
            text specified on the Invoice Settings page in your Recurly admin.
            Specify custom notes with this tag to add or override Terms and
            Conditions. Custom notes will stay with a subscription on all
            renewals.
        customer_notes:
          type: string
          description: >-
            Optional notes field. This will default to the Customer Notes text
            specified on the Invoice Settings page in your Recurly admin.
            Specify custom notes with this tag to add or override Customer
            Notes. Custom notes will stay with a subscription on all renewals.
        action_result:
          type: string
          description: >-
            Action result params to be used in Recurly-JS to complete a payment
            when using asynchronous payment methods, e.g., Boleto, iDEAL and
            Sofort.
