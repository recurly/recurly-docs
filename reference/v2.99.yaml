    put:
      summary: Update Account
      description: >-
        Updates an existing account.



        ###### Please note

        <div class="alert alert--info" markdown="1">

        You may optionally include billing information when updating an account.
        If the billing information is provided, the billing information will be
        validated. The account will only be updated if the billing information
        is valid.

        </div>
            
      tags:
        - accounts
      operationId: updateAccount
      parameters:
        - in: path
          name: account_code
          schema:
            type: string
            default: ''
          required: true
          description: Account's unique code.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                parent_account_code:
                  type: string
                  default: ''
                  description: >-
                    The account code of the new parent account. Allows
                    associating a new account to an existing account as its
                    child. Sending an empty <parent_account_code> tag will
                    remove an associated parent account from an existing account
                username:
                  type: string
                  default: ''
                  description: >-
                    The username for the account, ignore if you do not use
                    usernames. Max of 255 characters.
                email:
                  type: string
                  default: ''
                  description: The email address for the account.
                first_name:
                  type: string
                  default: ''
                  description: The first name for the account. Max of 255 characters.
                last_name:
                  type: string
                  default: ''
                  description: The last name for the account. Max of 255 characters.
                company_name:
                  type: string
                  default: ''
                  description: The company name for the account. Max of 50 characters.
                vat_number:
                  type: string
                  default: ''
                  description: >-
                    The VAT number to avoid having the VAT applied (if
                    applicable).
                tax_exempt:
                  type: boolean
                  default: ''
                  description: >-
                    The tax status of the account. `true` exempts tax on the
                    account, `false` applies tax on the account.
                entity_use_code:
                  type: string
                  default: ''
                  description: >-
                    The Avalara AvaTax value that can be passed to identify the
                    customer type for tax purposes. The range of values can be A
                    - R (more info at Avalara). Value is case-sensitive.
                account_acquisition:
                  type: object
                  default: ''
                  description: >-
                    The nested account acquisition information: `cost_in_cents`,
                    currency`, `channel`, `subchannel`, `campaign`
                billing_info:
                  type: object
                  default: ''
                  description: >-
                    The nested billing information. If present, the account will
                    only be created after the billing information is validated.
                address:
                  type: object
                  default: ''
                  description: >-
                    The nested address information for the account: `address1`,
                    `address2`, `city`, `state`, `zip`, `country`, `phone`.
                accept_language:
                  type: string
                  default: ''
                  description: >-
                    The ISO 639-1 language code from the user's browser,
                    indicating their preferred language and locale.
                cc_emails:
                  type: string
                  default: ''
                  description: >-
                    Additional email address that should receive account
                    correspondence. These should be separated only by commas.
                    These CC emails will receive all emails that the `email`
                    field also receives.
                preferred_locale:
                  type: string
                  default: ''
                  description: >-
                    Used to determine the language and locale of emails sent on
                    behalf of the merchant to the customer. The list of locales
                    is restricted to those the merchant has enabled on the site.
                preferred_time_zone:
                  type: string
                  default: ''
                  description: >-
                    Used to determine the time zone of emails sent on behalf of
                    the merchant to the customer. Must be a [supported IANA time
                    zone
                    name](https://docs.recurly.com/docs/email-time-zones-and-time-stamps#supported-api-iana-time-zone-names)
                invoice_template_uuid:
                  type: string
                  title: Invoice Template UUID
                  description: >-
                    Unique ID to identify an invoice template.  Available when
                    the site is on a Pro or Elite plan.  Used to specify which
                    invoice template, if any, should be used to generate
                    invoices for the account.
                dunning_campaign_id:
                  type: string
                  title: Dunning Campaign ID
                  description: >-
                    Unique ID to identify a dunning campaign. Available when the
                    Dunning Campaigns feature is enabled. Used to specify if a
                    non-default dunning campaign should be assigned to this
                    account. For sites without multiple dunning campaigns
                    enabled, the default dunning campaign will always be used.
                override_business_entity_id:
                  type: string
                  title: Override Business Entity ID
                  description: >-
                    Unique ID to identify the business entity assigned to the
                    account. Available when the `Multiple Business Entities`
                    feature is enabled.
                custom_fields:
                  $ref: '#/components/schemas/CustomFields'
      responses:
