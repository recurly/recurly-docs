    put:
      summary: Cancel Subscription
      description: >-
        Cancel a subscription so it remains active and then expires at the end
        of the current bill cycle.


        Canceling a subscription turns off the subscription's auto-renewal. The
        subscription will continue through the current, invoiced term. When the
        subscription is up for renewal, the account will transition to a free
        account and the subscription will no longer be active.


        When a subscription is canceled, Recurly will send a cancelation
        webhook. Recurly will send an additional subscription expired webhook
        once the subscription is no longer active.



        <div class="alert alert--warning" markdown="1">

        Please note: If a subscription that is set to start in the future is
        canceled, the subscription will be deleted from the account and will not
        show up in the account's subscription list.

        </div>
            
      tags:
        - subscriptions
      operationId: cancelSubscription
      parameters:
        - in: query
          name: timeframe
          schema:
            type: string
            default: ''
          description: >-
            `bill_date` to expire when the subscription next bills, `term_end`
            to expire at the end of the subscription term.
        - in: path
          name: uuid
          schema:
