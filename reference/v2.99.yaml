              print "Invalid account code: $e";
            }
        - lang: Ruby
          source: |-
            account = Recurly::Account.find('1')
            account.destroy
        - lang: Python
          source: |-
            account = recurly.Account.get('1')
            account.delete()
        - lang: Dotnet
