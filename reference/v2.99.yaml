      summary: Close Account
      description: >-
        Marks an account as closed and cancels any active subscriptions. Paused
        subscriptions will be expired.



        ###### Please note

        <div class="alert alert--info" markdown="1">

        Closing an account permanently deletes its billing information and
        cancels any active subscriptions (canceled subscriptions will remain
        active until the end of the current billing cycle before expiring).

        </div>
            
      tags:
        - accounts
      operationId: closeAccount
      parameters:
        - in: path
          name: account_code
          schema:
            type: string
            default: ''
          required: true
          description: Account's unique code.
      responses:
        '200':
          description: ''
          content:
            application/xml:
              example: ''
      x-codeSamples:
        - lang: PHP
          source: |-
            <?php

            try {
              $account = Recurly_Account::get('b6f5783');
              $account->close();

              print "Account: $account";
