servers:
  - url: https://{subdomain}.{domain}/v2
    variables:
      subdomain:
        description: Subdomain of your Recurly site.
        default: my-super-successful-company
      domain:
        description: Domain of your Recurly site.
        default: recurly.com
security:
  - api_key: []
components:
  securitySchemes:
    api_key:
      type: http
      description: >-
        Enter the API key as the username and set the password to an empty
        string. You can locate and manage your API keys from the [API
        Credentials](https://app.recurly.com/go/developer/api_keys) page.
      scheme: basic
  headers:
    Content-Type:
      schema:
        type: string
        enum:
          - application/xml; charset=utf-8
  parameters:
    plan_code:
      in: path
      name: plan_code
      schema:
        type: string
      required: true
      description: Unique code to identify the plan.
    subscription_uuid:
      in: path
      name: uuid
      schema:
        type: string
      required: true
      description: Subscription's unique identifier.
    transaction_uuid:
      in: path
      name: transaction_uuid
      schema:
        type: string
      required: true
      description: Transaction's unique id.
    general_ledger_account_id:
      name: general_ledger_account_id
      in: path
      description: General Ledger Account ID
      required: true
      schema:
        $ref: '#/components/schemas/GeneralLedgerAccountId'
    ids:
      name: ids
      in: query
      description: >
        Filter results by their IDs. Up to 200 IDs can be passed at once using

        commas as separators, e.g. `ids=h1at4d57xlmy,gyqgg0d3v9n1,jrsm5b4yefg6`.


        **Important notes:**


        * The `ids` parameter cannot be used with any other ordering or
        filtering
          parameters (`limit`, `order`, `sort`, `begin_time`, `end_time`, etc)
        * Invalid or unknown IDs will be ignored, so you should check that the
          results correspond to your request.
        * Records are returned in an arbitrary order. Since results are all
          returned at once you can sort the records yourself.
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
    limit:
      name: limit
      in: query
      description: Limit number of records 1-200.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    order:
      name: order
      in: query
      description: Sort order.
      schema:
        type: string
        $ref: '#/components/schemas/AlphanumericSortEnum'
    sort_dates:
      name: sort
      in: query
      description: >
        Sort field. You *really* only want to sort by `updated_at` in ascending

        order. In descending order updated records will move behind the cursor
        and could

        prevent some records from being returned.
      schema:
        default: created_at
        $ref: '#/components/schemas/TimestampSortEnum'
    filter_begin_time:
      name: begin_time
      in: query
      description: >
        Inclusively filter by begin_time when `sort=created_at` or
        `sort=updated_at`.

        **Note:** this value is an ISO8601 timestamp. A partial timestamp that
        does not include a time zone will default to UTC.
      schema:
        type: string
        format: date-time
    filter_end_time:
      name: end_time
      in: query
      description: >
        Inclusively filter by end_time when `sort=created_at` or
        `sort=updated_at`.

        **Note:** this value is an ISO8601 timestamp. A partial timestamp that
        does not include a time zone will default to UTC.
      schema:
        type: string
        format: date-time
    custom_field_definition_id:
      name: custom_field_definition_id
      in: path
      description: Custom Field Definition ID
      required: true
      schema:
        type: string
    survey_session_id:
      name: survey_session_id
      in: path
      description: Survey Session ID
      required: true
      schema:
        type: string
        example: e28zov4fw0v2
    external_product_id:
      name: external_product_id
      in: path
      description: External product ID, e.g. `e28zov4fw0v2`.
      required: true
      schema:
        type: string
    external_product_reference_id:
      name: external_product_reference_id
      in: path
      description: External product reference ID, e.g. `d39iun2fw1v4`.
      required: true
      schema:
        type: string
    external_payment_phase_id:
      name: external_payment_phase_id
      in: path
      description: External payment phase ID, e.g. `d39iun2fw1v4`.
      required: true
      schema:
        type: string
    external_subscription_id_fetch:
      name: external_subscription_id
      in: path
      description: >-
        External subscription ID, external_id or uuid. For ID no prefix is used
        e.g. `e28zov4fw0v2`. For external_id use prefix `external-id-`, e.g.
        `external-id-123456` and for uuid use prefix `uuid-` e.g.
        `uuid-7293239bae62777d8c1ae044a9843633`.
      required: true
      schema:
        type: string
    external_subscription_id:
      name: external_subscription_id
      in: path
      description: External subscription ID, e.g. `d39iun2fw1v4`.
      required: true
      schema:
        type: string
    performance_obligation_id:
      name: performance_obligation_id
      in: path
      description: Performance Obligation id.
      required: true
      schema:
        $ref: '#/components/schemas/PerformanceObligationId'
    vertex_transaction_type:
      name: vertex_transaction_type
      in: query
      description: |
        Possible values are `sale`, `rental`, `lease`.
      schema:
        $ref: '#/components/schemas/VertexTransactionTypeEnum'
  schemas:
    AccountCode:
      type: string
      description: The unique identifier of the account.
      example: 1
      xml:
        name: account_code
    BankAccountAuthorizedAt:
      type: string
      format: date-time
      description: >-
        Merchants importing recurring subscriptions paid with ACH into Recurly
        can backdate the subscription's authorization with this attribute using
        an [ISO 8601](https://en.wikipedia.org/wiki/ISO_8601) timestamp. This
        timestamp is used for alerting customers to reauthorize in 3 years in
        accordance with NACHA rules. If a subscription becomes inactive or the
        billing info is no longer a bank account, liquidthis timestamp is
        cleared.
      default: ''
      xml:
        name: bank_account_authorized_at
    BillingInfoUuid:
      type: string
      description: >-
        The `billing_info_uuid` is the value that represents a specific billing
        info for an end customer. When `billing_info_uuid` is used to assign
        billing info to the subscription, all future billing events for the
        subscription will bill to the specified billing info.
        `billing_info_uuid` can ONLY be used for sites utilizing the Wallet
        feature.
      example: iiznlrvdt8py
      xml:
        name: billing_info_uuid
    CollectionMethodEnum:
      type: string
      enum:
        - manual
        - automatic
      default: automatic
      description: >-
        Optional field to set the collection for an invoice as `automatic` or
        `manual`. The default is `automatic` if it's not set.
    AlphanumericSortEnum:
      type: string
      enum:
        - asc
        - desc
    TimestampSortEnum:
      type: string
      enum:
        - created_at
        - updated_at
    VertexTransactionTypeEnum:
      type: string
      title: Vertex Transaction Type
      description: >-
        Used by Vertex for tax calculations. Possible values are sale, rental,
        lease.
      enum:
        - sale
        - rental
        - lease
    CostInCents:
      type: integer
      minimum: 0
    CouponCode:
      type: string
      default: ''
      description: >-
        Optional coupon code to redeem on the account and discount the
        subscription. Please note, the subscription request will fail if the
        coupon is invalid.
      example: 5_percent_off
      xml:
        name: coupon_code
    Currencies:
      type: array
      description: Array of currency objects, see example below. Max 10000000.
      items:
        type: object
      maxItems: 10000000
      example: |-
        <unit_amount_in_cents>
          <USD>500</USD>
          <EUR>400</EUR>
        </unit_amount_in_cents>
      xml:
        name: currrencies
    CurrencyCode:
      type: string
      maxLength: 3
      description: 3-letter ISO 4217 currency code.
      example: USD
      xml:
        name: currency
    CustomerNotes:
      type: string
      default: ''
      description: >-
        Optional notes field. This will default to the Customer Notes text
        specified on the Invoice Settings page in your Recurly admin. Specify
        custom notes with this tag to add or override Customer Notes. Custom
        notes will stay with a subscription on all renewals. Custom notes made
        on an invoice for a one time charge will not carry over to subsequent
        invoices.
      xml:
        name: customer_notes
    CustomField:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
          maxLength: 50
          pattern: /^[a-z0-9_-]+$/i
          title: Field name
          description: >-
            Fields must be created in the UI before values can be assigned to
            them.
        value:
          type: string
          maxLength: 255
          title: Field value
          description: >-
            Any values that resemble a credit card number or security code
            (CVV/CVC) will be rejected.
    CustomFieldDefinition:
      type: object
      title: Custom field definition
      properties:
        id:
          type: string
          title: Custom field definition ID
          readOnly: true
        object:
          type: string
          title: Object type
          readOnly: true
        related_type:
          title: Related Recurly object type
          $ref: '#/components/schemas/RelatedTypeEnum'
        name:
          type: string
          title: Name
          description: >-
            Used by the API to identify the field or reading and writing. The
            name can only be used once per Recurly object type.
          pattern: /^[a-z0-9_-]+$/i
          maxLength: 50
        user_access:
          title: User access
          description: >
            The access control applied inside Recurly's admin UI:

            - `api_only` - No one will be able to view or edit this field's data
            via the admin UI.

            - `read_only` - Users with the Customers role will be able to view
            this field's data via the admin UI, but
              editing will only be available via the API.
            - `write` - Users with the Customers role will be able to view and
            edit this field's data via the admin UI.

            - `set_only` - Users with the Customers role will be able to set
            this field's data via the admin console.
          $ref: '#/components/schemas/UserAccessEnum'
        display_name:
          type: string
          title: Display name
          description: >-
            Used to label the field when viewing and editing the field in
            Recurly's admin UI.
          maxLength: 50
        tooltip:
          type: string
          title: Tooltip description
          description: >-
            Displayed as a tooltip when editing the field in the Recurly admin
            UI.
          pattern: /^[a-z0-9_-]+$/i
          maxLength: 255
        created_at:
          type: string
          format: date-time
          title: Created at
          readOnly: true
        updated_at:
          type: string
          format: date-time
          title: Last updated at
          readOnly: true
        deleted_at:
          type: string
          format: date-time
          title: Deleted at
          description: >-
            Definitions are initially soft deleted, and once all the values are
            removed from the accouts or subscriptions, will be hard deleted an
            no longer visible.
          readOnly: true
    CustomFieldDefinitionList:
      type: object
      properties:
        object:
          type: string
          title: Object type
          description: Will always be List.
        has_more:
          type: boolean
          description: Indicates there are more results on subsequent pages.
        next:
          type: string
          description: Path to subsequent page of results.
        data:
          type: array
          items:
            $ref: '#/components/schemas/CustomFieldDefinition'
    CustomFields:
      type: array
      items:
        $ref: '#/components/schemas/CustomField'
      title: Custom Fields
      description: >-
        The custom fields will only be altered when they are included in a
        request. Sending an empty array will not remove any existing values. To
        remove a field send the name with a null or empty value.
    Email:
      type: string
      maxLength: 255
      example: verena@example.com
      xml:
        name: email
    ErrorTypeEnum:
      type: string
      enum:
        - bad_request
        - immutable_subscription
        - internal_server_error
        - invalid_api_key
        - invalid_api_version
        - invalid_content_type
        - invalid_permissions
        - invalid_token
        - missing_feature
        - not_found
        - rate_limited
        - service_not_available
        - simultaneous_request
        - tax_service_error
        - transaction
        - unauthorized
        - unavailable_in_api_version
        - unknown_api_version
        - validation
    FirstName:
      type: string
      title: First name
      example: Verena
      xml:
        name: first_name
    GatewayCode:
      type: string
      default: ''
      description: >-
        An alphanumeric code shown per gateway on your site's payment gateways
        page. Set this code to ensure that a given purchase/subscription targets
        a given gateway. If setting for a billing info, must be used in
        conjunction with a `gateway_token`.
      xml:
        name: gateway_code
    GeneralLedgerAccountTypeEnum:
      type: string
      enum:
        - liability
        - revenue
      xml:
        name: account_type
    GeneralLedgerAccountId:
      type: string
      title: General Ledger Account ID
      description: |
        The ID of a general ledger account. General ledger accounts are
        only accessible as a part of the Recurly RevRec Standard and
        Recurly RevRec Advanced features.
      maxLength: 13
      example: iiznlrvdt8py
      xml:
        name: id
    GeneralLedgerAccountCode:
      type: string
      title: Accounting code for the ledger account.
      description: |
        Unique code to identify the ledger account. Each code must start
        with a letter or number. The following special characters are
        allowed: `-_.,:`
      pattern: /^[A-Za-z0-9](( *)?[\-A-Za-z0-9_.,:])*$/
      example: 100abc
      maxLength: 255
      xml:
        name: code
    GeneralLedgerAccountDescription:
      type: string
      title: Description
      description: Optional description.
      example: Lorem ipsum dolor sit amet, consectetur adipiscing elit.
      maxLength: 255
      xml:
        name: description
    ImportedTrial:
      type: boolean
      description: >-
        Indicates if the subscription is to be treated as an import for data
        analysis or a real trial. This value can only be changed on a trial
        subscription and is persisted for its lifetime.
      default: false
    Item:
      type: object
      description: Full item details.
      properties:
        item_code:
          type: string
          default: ''
          description: Unique code to identify the item. Max of 50 characters.
        name:
          type: string
          default: ''
          description: Item name. Max of 255 characters.
        description:
          type: string
          default: ''
          description: Optional plan description, not displayed.
        external_sku:
          type: string
          default: ''
          description: >-
            Stock keeping unit to link the item to other inventory. Max of 50
            characters.
        accounting_code:
          type: string
          default: ''
          description: >-
            Accounting code for invoice line items. Code may only contain the
            following characters: [a-z 0-9 @ - _ .]. Max of 20 characters.
        revenue_schedule_type:
          type: string
          default: evenly
          description: >-
            Optional field for setting a revenue schedule type. This will
            determine how revenue for the associated Item should be recognized.
          enum:
            - never
            - evenly
            - at_range_start
            - at_range_end
        tax_exempt:
          type: boolean
          default: 'false'
          description: >-
            `true` exempts tax on the charge, `false` applies tax on the charge.
            If not defined, defaults to `false`.
        state:
          type: string
          default: ''
          description: >-
            The current state of the item. Will be either active or inactive.
            Read-only.
          enum:
            - active
            - inactive
        custom_fields:
          $ref: '#/components/schemas/CustomFields'
        liability_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        revenue_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        performance_obligation_id:
          $ref: '#/components/schemas/PerformanceObligationId'
        created_at:
          type: string
          format: date-time
          description: The datetime this item was created
        updated_at:
          type: string
          format: date-time
          description: The datetime this item was last updated
    LastName:
      type: string
      title: Last name
      example: Example
      xml:
        name: last_name
    NetTerms:
      type: integer
      title: Net terms
      description: >-
        Integer paired with `Net Terms Type` and representing the number

        of days past the current date (for `net` Net Terms Type) or days after

        the last day of the current month (for `eom` Net Terms Type) that the

        invoice will become past due. For `manual` collection method, an
        additional 24 hours is

        added to ensure the customer has the entire last day to make payment
        before

        becoming past due. For example:


        If an invoice is due `net 0`, it is due 'On Receipt' and will become
        past due 24 hours after it's created.

        If an invoice is due `net 30`, it will become past due at 31 days
        exactly.

        If an invoice is due `eom 30`, it will become past due 31 days from the
        last day of the current month.


        For `automatic` collection method, the additional 24 hours is not added.
        For example, On-Receipt is due immediately, and `net 30` will become due
        exactly 30 days from invoice generation, at which point Recurly will
        attempt collection.

        When `eom` Net Terms Type is passed, the value for `Net Terms` is
        restricted to `0, 15, 30, 45, 60, or 90`.


        For more information on how net terms work with `manual` collection
        visit our docs page
        (https://docs.recurly.com/docs/manual-payments#section-collection-terms)

        or visit
        (https://docs.recurly.com/docs/automatic-invoicing-terms#section-collection-terms)
        for information about net terms using `automatic` collection.
      minimum: 0
      default: 0
    NetTermsTypeEnum:
      type: string
      title: Net Terms Type
      description: >
        Optionally supplied string that may be either `net` or `eom`
        (end-of-month).

        When `net`, an invoice becomes past due the specified number of `Net
        Terms` days from the current date.

        When `eom` an invoice becomes past due the specified number of `Net
        Terms` days from the last day of the current month.
      enum:
        - net
        - eom
      default: net
    PerformanceObligationId:
      type: string
      title: Performance Obligation ID
      description: |
        The ID of a performance obligation. Performance obligations are
        only accessible as a part of the Recurly RevRec Standard and
        Recurly RevRec Advanced features.
      maxLength: 13
      xml:
        name: id
    PlanCode:
      type: string
      default: ''
      maxLength: 50
      description: >-
        Unique code to identify the plan. This code may only contain the
        following characters: [a-z 0-9 @ - _ .]. Max of 50 characters.
      example: gold
    PoNumber:
      type: string
      default: ''
      description: >-
        A PO number for the resulting invoice. Manual invoicing must be enabled
        on your site, invoice type must be `manual`, and must be a charge to use
        this field.
      xml:
        name: po_number
    PricingModelTypeEnum:
      type: string
      title: Pricing Model
      enum:
        - fixed
        - ramp
      default: fixed
      description: |
        A fixed pricing model has the same price (i.e. `unit_amount_in_cents`)
        for each billing period. A ramp pricing model instead defines a set of
        ramp intervals (i.e. `ramp_intervals`), where a subscription changes
        price on a specified cadence of billing periods. The price change could
        be an increase or decrease. Ramp pricing is only available on Recurly
        Pro and Elite plans, as well as sandbox sites.
      xml:
        name: pricing_model
    ProrationSettings:
      type: object
      title: Proration Settings
      description: >-
        Allows you to control how any resulting charges and credits will be
        calculated and prorated.
      properties:
        charge:
          $ref: '#/components/schemas/ProrationSettingsChargeEnum'
        credit:
          $ref: '#/components/schemas/ProrationSettingsCreditEnum'
    ProrationSettingsChargeEnum:
      type: string
      title: Charge
      description: Determines how the amount charged is determined for this change
      default: prorated_amount
      enum:
        - full_amount
        - prorated_amount
        - none
    ProrationSettingsCreditEnum:
      type: string
      title: Credit
      description: Determines how the amount credited is determined for this change
      default: prorated_amount
      enum:
        - full_amount
        - prorated_amount
        - none
    PutMethodAttribute:
      type: string
      enum:
        - put
      xml:
        attribute: true
    Quantity:
      type: integer
      description: Optionally override the default quantity of 1.
      default: 1
      minimum: 0
      xml:
        name: quantity
    RampIntervalStartingBillingCycle:
      type: integer
      description: Represents the billing cycle where a ramp interval starts.
      minimum: 1
      default: 1
    ReferenceHref:
      type: string
      format: url
      example: https://your-subdomain.recurly.com/v2/...
      xml:
        attribute: true
    RelatedTypeEnum:
      type: string
      enum:
        - account
        - item
        - plan
        - subscription
        - charge
    RenewalBillingCycles:
      type: integer
      description: >-
        The number of billing periods in the subscription's next term. Will
        default to the plan's `total_billing_cycles` unless specified.
      minimum: 0
      xml:
        name: renewal_billing_cycles
    RevenueScheduleTypeEnum:
      type: string
      description: >-
        Optional field for setting a revenue schedule type. This will determine
        how revenue for the associated Subscription should be recognized. When
        creating a Subscription, available schedule types are `never`, `evenly`,
        `at_range_start`, or `at_range_end`. If no `revenue_schedule_type` is
        set, the Subscription will inherit the `revenue_schedule_type` from its
        Plan.
      enum:
        - never
        - evenly
        - at_range_start
        - at_range_end
      xml:
        name: revenue_schedule_type
    ShippingAddressId:
      type: integer
      format: int64
      default: ''
      description: >-
        All subscriptions and adjustments on the purchase will use this shipping
        address unless they specify one of their own. Any subscriptions for
        which this address might apply will also use it in future renewals
        unless changed or removed. Cannot be used if a new shipping address is
        created at the account level.
      xml:
        name: shipping_address_id
    ShippingMethod:
      type: object
      properties:
        object:
          type: string
          title: Object type
          readOnly: true
        code:
          type: string
          title: Code
          description: The internal name used identify the shipping method.
          maxLength: 50
        name:
          type: string
          title: Name
          description: The name of the shipping method displayed to customers.
          maxLength: 100
        accounting_code:
          type: string
          title: Accounting Code
          description: Accounting code for shipping method.
          maxLength: 20
        tax_code:
          type: string
          title: Tax code
          description: >
            Used by Avalara, Vertex, and Recurly’s built-in tax feature. The tax

            code values are specific to each tax system. If you are using
            Recurly’s

            built-in taxes the values are:


            - `FR` – Common Carrier FOB Destination

            - `FR022000` – Common Carrier FOB Origin

            - `FR020400` – Non Common Carrier FOB Destination

            - `FR020500` – Non Common Carrier FOB Origin

            - `FR010100` – Delivery by Company Vehicle Before Passage of Title

            - `FR010200` – Delivery by Company Vehicle After Passage of Title

            - `NT` – Non-Taxable
          maxLength: 50
        liability_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        revenue_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        performance_obligation_id:
          $ref: '#/components/schemas/PerformanceObligationId'
        created_at:
          type: string
          format: date-time
          title: Created at
          readOnly: true
        updated_at:
          type: string
          format: date-time
          title: Last updated at
          readOnly: true
    StartsAt:
      type: string
      format: date-time
      default: ''
      description: >-
        If set, the subscription will begin on this specified date. The
        subscription will apply the setup fee and trial period, unless the plan
        has no trial. Omit this field if the subscription should be started
        immediately.
    SubscriptionAddOns:
      type: array
      description: >-
        Nested add-on information for the subscription. When creating, the new
        subscription will have no add-ons unless specified.
      items:
        type: object
      default: []
      xml:
        name: subscription_add_ons
        wrapped: true
    SubscriptionStateEnum:
      type: string
      enum:
        - active
        - canceled
        - expired
        - failed
        - future
        - paused
    TaxInclusive:
      type: boolean
      description: >-
        Determines whether or not tax is included in the unit amount. The Tax
        Inclusive Pricing feature (separate from the Mixed Tax Pricing feature)
        must be enabled to use this flag.
      default: false
      xml:
        name: tax_inclusive
    TermsAndConditions:
      type: string
      default: ''
      description: >-
        Optional notes field. This will default to the Terms and Conditions text
        specified on the Invoice Settings page in your Recurly admin. Specify
        custom notes with this tag to add or override Terms and Conditions.
        Custom notes will stay with a subscription on all renewals.
      xml:
        name: terms_and_conditions
    TotalBillingCycles:
      type: integer
      minimum: 0
      description: The total number of billing cycles for the current subscription term.
      xml:
        name: total_billing_cycles
    TransactionTypeEnum:
      type: string
      description: >-
        An optional type designation for the payment gateway transaction created
        by this request. Supports `'moto'` value, which is the acronym for mail
        order and telephone transactions.
      enum:
        - moto
      default: ''
      xml:
        name: transaction_type
    TrialEndsAt:
      type: string
      format: date-time
      default: ''
      description: >-
        If set, overrides the default trial behavior for the subscription. This
        must be a date and time, preferably in UTC. If the date is in the past,
        the subscription will skip the trial.
      xml:
        name: trial_ends_at
    UserAccessEnum:
      type: string
      enum:
        - api_only
        - read_only
        - write
        - set_only
    VatReverseChargeNotes:
      type: string
      default: ''
      description: >-
        VAT Reverse Charge Notes only appear if you have EU VAT enabled or are
        using your own Avalara AvaTax account and the customer is in the EU, has
        a VAT number, and is in a different country than your own. This will
        default to the VAT Reverse Charge Notes text specified on the Tax
        Settings page in your Recurly admin, unless custom notes were created
        with the original subscription. Specify custom notes with this tag to
        add or override VAT Reverse Charge Notes. Custom notes will stay with a
        subscription on all renewals.
      xml:
        name: vat_reverse_charge_notes
    Account:
      allOf:
        - $ref: '#/components/schemas/AccountMini'
        - properties:
            parent_account:
              type: string
              description: The URL of the parent for the specified account.
            child_accounts:
              type: string
              description: The URL of the child accounts for the specified account.
            bill_to:
              type: string
              description: >-
                `self` or `parent`. Determines whether all charges are billed
                using parent's billing information or the account itself.  If
                bill_to = parent, all invoices resulting in charges and credits
                originating from a child will be created on the parent account.
                (e.g creating a subscription on the child account will be billed
                to parent and invoiced on the parent account)
            adjustments:
              type: string
              description: The URL of adjustments for the specified account.
            account_balance:
              type: string
              description: The URL of the account balance for the specified account.
            billing_info:
              type: string
              description: The URL of billing info for the specified account.
            invoices:
              type: string
              description: The URL of invoices for the specified account.
            redemption:
              type: string
              description: The URL of the coupon redemption for the specified account.
            subscriptions:
              type: string
              description: The URL of subscriptions for the specified account.
            transactions:
              type: string
              description: The URL of transactions for the specified account.
            notes:
              type: string
              description: The URL of notes on the account
            state:
              type: string
              description: 'The state of accounts to return: `active` or `closed`.'
            username:
              type: string
              description: The username of the account.
            cc_emails:
              type: string
              description: >-
                Additional email address that should receive account
                correspondence. These should be separated only by commas. These
                CC emails will receive all emails that the `email` field also
                receives.
            company_name:
              type: string
              description: The company name of the account.
            vat_number:
              type: string
              description: The VAT number of the account (to avoid having the VAT applied).
            tax_exempt:
              type: boolean
              description: >-
                The tax status of the account. `true` exempts tax on the
                account, `false` applies tax on the account.
            address:
              type: object
              description: >-
                The nested address information of the account: `address1`,
                `address2`, `city`, `state`, `zip`, `country`, `phone`.
            shipping_address:
              type: object
              description: >-
                The nested shipping address information of the account:
                `first_name`, `last_name`, `company_name`, `email`, `phone`,
                `vat_number`,  `address1`, `address2`, `city`, `state`, `zip`,
                `country`, `nickname`. You can pass in up to 20 account shipping
                addresses along with the request to create a new account. When
                providing a shipping address, the following are required:
                first_name, last_name, address1, city, state, zip, and country.
            accept_language:
              type: string
              description: >-
                The ISO 639-1 language code from the user's browser, indicating
                their preferred language and locale. This attribute is different
                from `preferred_locale` and does not determine which language
                emails sent on behalf of the merchant.
            hosted_login_token:
              type: string
              description: >-
                The unique token for automatically logging the account in to the
                hosted management pages. You may automatically log the user into
                their hosted management pages by directing the user to:
                `https://:subdomain.recurly.com/account/:hosted_login_token`.
            created_at:
              type: string
              format: date-time
              description: The date and time the account was created in Recurly.
            updated_at:
              type: string
              format: date-time
              description: >-
                The date and time the account or its billing info was last
                updated.
            closed_at:
              type: string
              format: date-time
              description: For closed accounts, the date and time it was closed.
            has_live_subscription:
              type: boolean
              description: True if the account has at least one live subscription.
            has_active_subscription:
              type: boolean
              description: True if the account has at least one active subscription.
            has_future_subscription:
              type: boolean
              description: True if the account has at least one future subscription.
            has_canceled_subscription:
              type: boolean
              description: True if the account has at least one canceled subscription.
            has_paused_subscription:
              type: string
              description: True if the account has at least one paused subscription.
            has_past_due_invoice:
              type: boolean
              description: True if the account has at least one past due invoice.
            preferred_locale:
              type: string
              description: >-
                Used to determine the language and locale of emails sent on
                behalf of the merchant to the customer. The list of locales is
                restricted to those the merchant has enabled on the site.
            preferred_time_zone:
              type: string
              description: >-
                The [IANA time zone
                name](https://docs.recurly.com/docs/email-time-zones-and-time-stamps#supported-api-iana-time-zone-names)
                used to determine the time zone of emails sent on behalf of the
                merchant to the customer.
            dunning_campaign_id:
              type: string
              description: The uuid of the associated dunning campaign of the account.
            override_business_entity_id:
              type: string
              description: >-
                The uuid of the associated business entity of the account.
                Available when the `Multiple Business Entities` feature is
                enabled.
            custom_fields:
              $ref: '#/components/schemas/CustomFields'
    AccountWithCodeOnly:
      type: object
      title: Account
      required:
        - account_code
      properties:
        account_code:
          $ref: '#/components/schemas/AccountCode'
      xml:
        name: account
    AccountMini:
      allOf:
        - $ref: '#/components/schemas/AccountWithCodeOnly'
        - properties:
            first_name:
              allOf:
                - $ref: '#/components/schemas/FirstName'
                - description: The first name of the account.
            last_name:
              allOf:
                - $ref: '#/components/schemas/LastName'
                - description: The last name of the account.
            email:
              allOf:
                - $ref: '#/components/schemas/Email'
                - description: The email address of the account.
    Address:
      type: object
      properties:
        address1:
          type: string
          example: 123 Main St.
        address2:
          type: string
          example: Suite 101
        city:
          type: string
          example: San Francisco
        state:
          type: string
          example: CA
        zip:
          type: string
          example: 94105
        country:
          type: string
          example: US
          maxLength: 2
        phone:
          type: string
          example: 555-222-1212
    AddressWithName:
      allOf:
        - $ref: '#/components/schemas/Address'
        - properties:
            first_name:
              $ref: '#/components/schemas/FirstName'
            last_name:
              $ref: '#/components/schemas/LastName'
    AddressWithNameResponse:
      allOf:
        - $ref: '#/components/schemas/Address'
        - properties:
            name:
              type: string
              description: Full name comprised of `first_name` and `last_name`.
              example: Verena Example
    AddOn:
      type: object
      properties:
        plan_code:
          type: string
          description: Unique code to identify the plan.
        plan:
          type: string
          description: The URL of the plan the add-on is in.
        measured_unit:
          type: string
          description: >-
            If the add-on is usage-based, this is the URL of the measured unit
            associated with the add-on.
        add_on_code:
          type: string
          description: The add-on code. Max of 50 characters.
        item_code:
          type: string
          description: >-
            Item code for an existing active item to be used as an add-on on the
            plan. This will be unique identifier for add-on within the plan.
        name:
          type: string
          description: The add-on name. Max of 255 characters.
        default_quantity:
          type: integer
          description: Default quantity for the hosted pages, defaults to 1.
        display_quantity_on_hosted_page:
          type: boolean
          description: >-
            If true, displays a quantity field on the hosted pages for the
            add-on.
        tax_code:
          type: string
          maxLength: 50
          title: Tax code
          description: >-
            Optional field used by Avalara, Vertex, and Recurly's In-the-Box tax
            solution to determine taxation rules. You can pass in specific tax
            codes using any of these tax integrations. For Recurly's In-the-Box
            tax offering you can also choose to instead use simple values of
            `unknown`, `physical`, or `digital` tax codes. If
            `item_code`/`item_id` is part of the request then `tax_code` must be
            absent.
        unit_amount_in_cents:
          type: array
          items:
            type: object
          description: >-
            Array of unit amounts with their currency code. Max 10000000. Ex.
            $5.00 USD would be <USD>500</USD>. `unit_amount_in_cents` is not
            allowed when creating or updating a tiered add-on.
        accounting_code:
          type: string
          description: >-
            Accounting code for invoice line items for the add-on. Max of 20
            characters.
        add_on_type:
          type: string
          description: >-
            Whether the add-on type is Fixed (fixed), or Usage-Based (usage). If
            `item_code` is present, `add_on_type` must be absent.
        optional:
          type: boolean
          description: >-
            Whether the add-on is optional for the customer to include in their
            purchase on the hosted payment page. If false, the add-on will be
            included when a subscription is created through the Recurly UI.
            However, the add-on will not be included when a subscription is
            created through the API. See
            https://dev.recurly.com/docs/subscription-add-ons for how to create
            a subscription with add-ons using the API.
        usage_type:
          type: string
          description: >-
            If `add_on_type` = `usage`, you will see `usage_type`, which can be
            `price` or `percentage`. If `price`, the price is defined in
            `unit_amount_in_cents`. If `percentage`, the percentage is defined
            in `usage_percentage`.
        usage_calculation_type:
          type: string
          description: >-
            The method used to calculate usage for a billing period.  Can be
            null, `cumulative`, or `last_in_period`.  If no value is specified,
            behavior will default to cumulative billing.  For cumulative
            billing, all usage records for the billing period will be summed
            together.  For last-in-period billing, only the last recorded usage
            record in the billing period will be used.
        usage_percentage:
          type: number
          format: float
          description: >-
            The percentage taken of the monetary amount of usage tracked. This
            can be up to 4 decimal places. A value between 0.0 and 100.0.
            Required if `add_on_type` is usage and `usage_type` is percentage.
            Must be omitted otherwise. `usage_percentage` does not support
            tiers.
        revenue_schedule_type:
          type: string
          description: >-
            Optional field for setting a revenue schedule type. This will
            determine how revenue for the associated Plan should be recognized.
            When creating a Plan, if you supply an `end_date` and `end_date`
            available schedule types are `never`, `evenly`, `at_range_start`, or
            `at_range_end`.
        created_at:
          type: string
          format: date-time
          description: When the add-on was created in the plan.
        updated_at:
          type: string
          format: date-time
          description: When the add-on was last updated.
        tier_type:
          type: string
          description: >-
            Add-on tier type. Defaults to flat which charges a fixed price per
            unit. When tiered-pricing is used, tier_type can be tiered, volume
            or stairstep. For more info, see our product docs
            (https://docs.recurly.com/docs/billing-models#section-quantity-based).
            This value cannot be changed after it has been saved.
        tiers:
          type: array
          items:
            type: object
          description: An array of Tier objects. Required if `tier_type != "flat"`.
        percentage_tiers:
          type: array
          items:
            type: object
          description: >
            Array of objects which must have at least one set of tiers

            per currency and the currency code. The tier_type must be `volume`
            or `tiered`,

            if not, it must be absent. There must be one tier without an
            `ending_amount` value

            which represents the final tier.
      required:
        - plan_code
    AdjustmentBase:
      type: object
      properties:
        account:
          type: string
          description: The URL of the account for the specified adjustment.
        invoice:
          type: string
          description: The URL of the invoice for the specified adjustment.
        uuid:
          type: string
          description: The unique identifier of the adjustment.
        state:
          type: string
          description: 'The state of the adjustments to return: `pending` or `invoiced`.'
        description:
          type: string
          description: >-
            Description of the adjustment for the adjustment. Max 255
            characters.
        accounting_code:
          type: string
          description: Accounting code. Max of 20 characters.
        origin:
          type: string
          description: >-
            The origin of the adjustment to return: `plan`, `plan_trial`,
            `setup_fee`, `add_on`, `add_on_trial`, `one_time`, `debit`,
            `credit`, `coupon`, or `carryforward`.
        vertex_transaction_type:
          $ref: '#/components/schemas/VertexTransactionTypeEnum'
        unit_amount_in_cents:
          type: integer
          description: >-
            Positive amount for a charge, negative amount for a credit. Max
            10000000.
        quantity:
          type: string
          description: Quantity.
        quantity_decimal:
          type: string
          title: Quantity Decimal
          description: >-
            A floating-point alternative to Quantity. If this value is present,
            it will be used in place of Quantity for calculations, and Quantity
            will be the rounded integer value of this number. This field
            supports up to 9 decimal places. The Decimal Quantity feature must
            be enabled to utilize this field.
        original_adjustment_uuid:
          type: string
          description: Only shows if adjustment is a credit created from another credit.
        discount_in_cents:
          type: integer
          description: The discount on the adjustment, in cents.
        tax_in_cents:
          type: integer
          description: The tax on the adjustment, in cents.
        total_in_cents:
          type: integer
          description: The total amount of the adjustment, in cents.
        currency:
          type: string
          description: Currency, 3-letter ISO code.
        taxable:
          type: boolean
          description: '`true` if the current adjustment is taxable, `false` if it is not.'
        tax_type:
          type: string
          description: The tax type of the adjustment.
        tax_region:
          type: string
          description: The tax region of the adjustment.
        tax_rate:
          type: string
          description: The tax rate of the adjustment.
        origin_tax_address_source:
          $ref: '#/components/schemas/OriginTaxAddressSourceEnum'
        destination_tax_address_source:
          $ref: '#/components/schemas/DestinationTaxAddressSourceEnum'
        tax_exempt:
          type: boolean
          description: >-
            `true` exempts tax on the charge, `false` applies tax on the charge.
            If not defined, then defaults to the Plan and Site settings. This
            attribute does not work for credits (negative adjustments). Credits
            are always post-tax. Pre-tax discounts should use the Coupons
            feature.
        tax_details:
          type: array
          items:
            type: object
          description: >-
            The nested address information of the adjustment: `name `, `type`,
            `tax_rate`, `tax_in_cents`.
        tax_code:
          type: string
          maxLength: 50
          title: Tax code
          description: >-
            Optional field used by Avalara, Vertex, and Recurly's In-the-Box tax
            solution to determine taxation rules. You can pass in specific tax
            codes using any of these tax integrations. For Recurly's In-the-Box
            tax offering you can also choose to instead use simple values of
            `unknown`, `physical`, or `digital` tax codes.
        start_date:
          type: string
          format: date-time
          description: A timestamp associated with when the adjustment began.
        end_date:
          type: string
          format: date-time
          description: A timestamp associated with when the adjustment ended.
        created_at:
          type: string
          format: date-time
          description: A timestamp associated with when the adjustment was created.
        product_code:
          type: string
          description: >-
            For plan related line items this will be the plan's code, for add-on
            related line items it will be the add-on's code.
        subscription:
          type: string
          description: >-
            A link to the adjustment's invoice's first subscription (if it
            exists).
        proration_rate:
          type: number
          format: float
          description: >-
            The proration rate is only present on prorated adjustments. It
            represents how much the adjustment was prorated to account for a mid
            cycle subscription change.
        credit_reason_code:
          type: string
          description: >-
            Can be set on POST if adjustment is a credit (unit_amount_in_cents <
            0)
        shipping_address:
          type: object
          description: The shipping address for this adjustment.
        item:
          type: string
          description: >-
            If there is an item associated with the adjustment, a link to the
            resource will be included in the response.
        item_code:
          type: string
          description: >-
            The `item_code` for the item associated with the adjustment, if
            there is one. Associates the adjustment with an item and sets
            related attributes on the adjustment from the default values on the
            item. `<description>`, `<product_code>`, `<accounting_code>`,
            `<tax_exempt>` and `<tax_code>` are not accepted when `<item_code>`
            is present.
        external_sku:
          type: string
          description: >-
            The `external_sku` for the item associated with the adjustment, if
            there is one.
        performance_obligation_id:
          $ref: '#/components/schemas/PerformanceObligationId'
        custom_fields:
          $ref: '#/components/schemas/CustomFields'
    AdjustmentCreate:
      type: object
      required:
