    SubscriptionRequest:
      title: Subscription (Basic Features)
      xml:
        name: subscription
      allOf:
        - $ref: '#/components/schemas/SubscriptionBase'
        - type: object
          required:
            - plan_code
            - account
            - currency
          properties:
            plan_code:
              $ref: '#/components/schemas/PlanCode'
            currency:
              $ref: '#/components/schemas/CurrencyCode'
            account:
              allOf:
                - $ref: '#/components/schemas/AccountMini'
                - properties:
                    billing_info:
                      $ref: '#/components/schemas/BillingInfoCC'
            quantity:
              $ref: '#/components/schemas/Quantity'
            unit_amount_in_cents:
              type: integer
              maximum: 10000000
              minimum: 0
              description: >-
                Override the unit amount of the subscription plan by setting
                this value in cents. If not provided, the subscription will
                inherit the price from the subscription plan for the provided
                currency. Max 10000000.
            total_billing_cycles:
              $ref: '#/components/schemas/TotalBillingCycles'
            renewal_billing_cycles:
              $ref: '#/components/schemas/RenewalBillingCycles'
            revenue_schedule_type:
              $ref: '#/components/schemas/RevenueScheduleTypeEnum'
            trial_ends_at:
              $ref: '#/components/schemas/TrialEndsAt'
            imported_trial:
              $ref: '#/components/schemas/ImportedTrial'
            starts_at:
              $ref: '#/components/schemas/StartsAt'
            next_bill_date:
              type: string
              format: date-time
              default: ''
              description: >-
                Indicates the subscription's next billing period start date.
                Subsequent billing period start dates will be offset from this
                date. The first invoice will be prorated appropriately so that
                the customer only pays for the portion of the first billing
                period for which the subscription applies. Useful for forcing a
                subscription to bill on the first of the month.
            coupon_code:
              $ref: '#/components/schemas/CouponCode'
            terms_and_conditions:
              $ref: '#/components/schemas/TermsAndConditions'
            customer_notes:
              $ref: '#/components/schemas/CustomerNotes'
            bulk:
              type: boolean
              description: >-
                Optional field to be used only when needing to bypass the 60
                second limit on creating subscriptions. Should only be used when
                creating subscriptions in bulk from the API. Set to `true` or
                `false`. Defaults to `false`.
              default: false
            transaction_type:
              type: string
              description: >-
                An optional type designation for the payment gateway transaction
                created by this request. Supports `'moto'` value, which is the
                acronym for mail order and telephone transactions.
              enum:
                - moto
              default: ''
            subscription_add_ons:
              $ref: '#/components/schemas/SubscriptionAddOns'
            custom_fields:
              $ref: '#/components/schemas/CustomFields'
            proration_settings:
              $ref: '#/components/schemas/ProrationSettings'
        - $ref: '#/components/schemas/GiftCardRedemption'
        - $ref: '#/components/schemas/SubscriptionInvoicing'
