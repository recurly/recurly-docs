    post:
      summary: Create Plan Add-On
      description: >+
        Add an add-on to a plan. Only one add-on can be created in a single
        request.

      tags:
        - plan-add-ons
      operationId: createPlanAddOn
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              required:
                - add_on_code
                - unit_amount_in_cents
                - name
              properties:
                item_code:
                  type: string
                  default: ''
                  description: >-
                    Item code for an existing active item to be used as an
                    add-on on the plan. This will be unique identifier for
                    add-on within the plan.
                add_on_code:
                  type: string
                  default: ''
                  description: >-
                    Add-on code. Max of 50 characters. If `item_code` present,
                    `add_on_code` must be absent. If `item_code` is not present,
                    `add_on_code` is required.
                add_on_type:
                  type: string
                  default: ''
                  description: >-
                    Whether the add-on type is Fixed (fixed), or Usage-Based
                    (usage). If `item_code` is present, `add_on_type` must be
                    absent.
                default_quantity:
                  type: integer
                  default: '1'
                  description: Default quantity for the hosted pages.
                unit_amount_in_cents:
                  type: array
                  items:
                    type: object
                  default: ''
                  description: >-
                    Array of unit amounts with their currency code. Max
                    `10000000`. Optional if `item_code` present and existing
                    item has default pricing. If `tiers` is present,
                    `unit_amount_in_cents` must be absent. Otherwise
                    `unit_amount_in_cents` is required.
                liability_gl_account_id:
                  $ref: '#/components/schemas/GeneralLedgerAccountId'
                revenue_gl_account_id:
                  $ref: '#/components/schemas/GeneralLedgerAccountId'
                performance_obligation_id:
                  $ref: '#/components/schemas/PerformanceObligationId'
                name:
                  type: string
                  default: ''
                  description: >-
                    Add-on name. Max of 255 characters. If `item_code` present,
                    `name` must be absent. If `item_code` is not present, `name`
                    is required.
                display_quantity_on_hosted_page:
                  type: boolean
                  default: 'false'
                  description: >-
                    Default quantity for hosted pages. Must be true if
                    `tier_type` != `flat`.
                accounting_code:
                  type: string
                  default: ''
                  description: >-
                    Accounting code for invoice line items for the add-on,
                    defaults to the value of `add_on_code`. Max of 20
                    characters. If `item_code` present, `accounting_code` must
                    be absent.
                revenue_schedule_type:
                  type: string
                  default: evenly
                  description: >-
                    Optional field for setting a revenue schedule type if
                    `add_on_type` = `fixed`. This will determine how revenue for
                    the associated Plan Add-On should be recognized. When
                    creating a Plan Add-On, available schedule types are
                    `never`, `evenly`, `at_range_start`, or `at_range_end`. If
                    `item_code` present, `revenue_schedule_type` must be absent.
                tax_code:
                  type: string
                  maxLength: 50
                  title: Tax code
                  description: >-
                    Optional field used by Avalara, Vertex, and Recurly's
                    In-the-Box tax solution to determine taxation rules. You can
                    pass in specific tax codes using any of these tax
                    integrations. For Recurly's In-the-Box tax offering you can
                    also choose to instead use simple values of `unknown`,
                    `physical`, or `digital` tax codes. If `item_code`/`item_id`
                    is part of the request then `tax_code` must be absent.
                optional:
                  type: boolean
                  default: 'true'
                  description: >-
                    Whether the add-on is optional for the customer to include
                    in their purchase on the hosted payment page. If false, the
                    add-on will be included when a subscription is created
                    through the Recurly UI. However, the add-on will not be
                    included when a subscription is created through the API.
                    [Click
                    here](https://recurly.com/developers/api-v2/latest/#operation/createSubscriptionWithAddOns)
                    for how to create a subscription with add-ons using the API.
                measured_unit_id:
                  type: string
                  default: ''
                  description: >-
                    The `id` of the measured unit on your site associated with
                    the add-on. If `item_code` present, `measured_unit_id` must
                    be absent.
                usage_type:
                  type: string
                  default: ''
                  description: >-
                    If `add_on_type` = `usage`, you must set a `usage_type`,
                    which can be `price` or `percentage`. If `price`, the price
                    is defined in `unit_amount_in_cents` or by providing a
                    `tier_type` and a set of tiers. If `percentage`, the
                    percentage is defined in `usage_percentage`. If `item_code`
                    is present, `usage_type` must be absent.
                usage_percentage:
                  type: string
                  default: ''
                  description: >-
                    The percentage taken of the monetary amount of usage
                    tracked. This can be up to 4 decimal places. A value between
                    0.0 and 100.0. Required if `add_on_type` is usage and
                    `usage_type` is percentage. Must be omitted otherwise.
                    `usage_percentage` does not support tiers.
                tier_type:
                  type: string
                  default: flat
                  description: >-
                    The pricing model for the add-on.  Defaults to `flat`. Other
                    options include `tiered`, `volume` or `stairstep`. Cannot be
                    changed once saved. For more information, [click
                    here](https://docs.recurly.com/docs/billing-models#section-quantity-based).
                tiers:
                  type: array
                  items:
                    type: object
                  default: ''
                  description: >-
                    If the `tier_type` is `flat`, then `tiers` must be absent.
                    The `tiers` object must include one to many tiers with
                    `ending_quantity` and `unit_amount_in_cents` for the desired
                    currencies. There must be one tier with an `ending_quantity`
                    of 999999999 which is the default if not provided.
      responses:
        '201':
          description: ''
          content:
            application/xml:
              examples:
                addOnFixed:
                  $ref: '#/components/examples/AddOnFixed'
                addOnUsage:
                  $ref: '#/components/examples/AddOnUsage'
                addOnItemBacked:
                  $ref: '#/components/examples/AddOnItemBacked'
                addOnQuantityBased:
                  $ref: '#/components/examples/AddOnQuantityBased'
                addOnItemBackedQuantityBased:
                  $ref: '#/components/examples/AddOnItemBackedQuantityBased'
                addOnUseageQauntityBased:
                  $ref: '#/components/examples/AddOnUseageQauntityBased'
              schema:
                $ref: '#/components/schemas/AddOn'
      x-codeSamples:
