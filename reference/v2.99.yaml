    put:
      summary: Update Plan Add-On
      description: >+
        Update the pricing information or description for an add-on. Existing
        subscriptions with the add-on will not receive any pricing updates.

      tags:
        - plan-add-ons
      operationId: updatePlanAddOn
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                name:
                  type: string
                  default: ''
                  description: >-
                    Add-on name. Max of 255 characters. If add-on has an
                    associated item, `name` is not updatable.
                unit_amount_in_cents:
                  type: array
                  items:
                    type: object
                  default: ''
                  description: >-
                    Array of unit amounts with their currency code. Max
                    10000000. If `tiers` is present, `unit_amount_in_cents` must
                    be absent. Otherwise `unit_amount_in_cents` is required.
                default_quantity:
                  type: integer
                  default: ''
                  description: Default quantity for the hosted pages.
                display_quantity_on_hosted_page:
                  type: string
                  default: ''
                  description: >-
                    If true, display a quantity field on the hosted pages for
                    the add-on. Must be true if `tier_type` != `flat`
                accounting_code:
                  type: string
                  default: ''
                  description: >-
                    Accounting code for invoice line items for the add-on,
                    defaults to the value of `add_on_code`. Max of 20
                    characters. If add-on has an associated item,
                    `accounting_code` is not updatable.
                revenue_schedule_type:
                  type: string
                  default: ''
                  description: >-
                    Optional field for setting a revenue schedule type if
                    `add_on_type` = `fixed`. This will determine how revenue for
                    the associated Plan Add-On should be recognized. When
                    creating a Plan Add-On, available schedule types are
                    `never`, `evenly`, `at_range_start`, or `at_range_end`. If
                    add-on has an associated item, `revenue_schedule_type` is
                    not updatable.
                tax_code:
                  type: string
                  maxLength: 50
                  title: Tax code
                  description: >-
                    Optional field used by Avalara, Vertex, and Recurly's
                    In-the-Box tax solution to determine taxation rules. You can
                    pass in specific tax codes using any of these tax
                    integrations. For Recurly's In-the-Box tax offering you can
                    also choose to instead use simple values of `unknown`,
                    `physical`, or `digital` tax codes. If an `Item` is
                    associated to the `AddOn` then `tax_code` must be absent.
                optional:
                  type: boolean
                  default: 'true'
                  description: >-
                    Whether the add-on is optional for the customer to include
                    in their purchase on the hosted payment page. If false, the
                    add-on will be included when a subscription is created
                    through the Recurly UI. However, the add-on will not be
                    included when a subscription is created through the API. See
                    https://recurly.com/developers/api-v2/latest/#operation/createSubscriptionWithAddOns
                    for how to create a subscription with add-ons using the API.
                measured_unit_id:
                  type: string
                  default: ''
                  description: >-
                    The id of the measured unit on your site associated with the
                    add-on. If add-on has an associated item, `measured_unit_id`
                    is not updatable.
                usage_percentage:
                  type: string
                  default: ''
                  description: >-
                    The percentage taken of the monetary amount of usage
                    tracked. This can be up to 4 decimal places. A value between
                    0.0 and 100.0. Required if `add_on_type` is usage and
                    `usage_type` is percentage. Must be omitted otherwise.
                    `usage_percentage` does not support tiers.
                tiers:
                  type: array
                  items:
                    type: object
                  default: ''
                  description: >-
                    If the `tier_type` is `flat`, then `tiers` must be absent.
                    The `tiers` object must include one to many tiers with
                    `ending_quantity` and `unit_amount_in_cents` for the desired
                    currencies. There must be one tier with an `ending_quantity`
                    of 999999999 which is the default if not provided.
                liability_gl_account_id:
                  $ref: '#/components/schemas/GeneralLedgerAccountId'
                revenue_gl_account_id:
                  $ref: '#/components/schemas/GeneralLedgerAccountId'
                performance_obligation_id:
                  $ref: '#/components/schemas/PerformanceObligationId'
      responses:
        '200':
          description: ''
          content:
            application/xml:
              examples:
                addOnFixed:
                  $ref: '#/components/examples/AddOnFixed'
                addOnQuantityBased:
                  $ref: '#/components/examples/AddOnQuantityBased'
                addOnItemBacked:
                  $ref: '#/components/examples/AddOnItemBacked'
              schema:
                $ref: '#/components/schemas/AddOn'
      x-codeSamples:
        - lang: xml
          source: |-
            <add_on>
              <unit_amount_in_cents>
                <USD>400</USD>
                <EUR>360</EUR>
              </unit_amount_in_cents>
              <revenue_schedule_type>at_range_start</revenue_schedule_type>
            </add_on>

            <!-- Quantity-Based -->
            <add_on>
              <tiers>
                <tier>
                  <ending_quantity>2000</ending_quantity>
                  <unit_amount_in_cents><USD>5000</USD></unit_amount_in_cents>
                </tier>
                <tier>
                  <ending_quantity>999999999</ending_quantity>
                  <unit_amount_in_cents><USD>644</USD></unit_amount_in_cents>
                </tier>
              </tiers>
            </add_on>
        - lang: PHP
          source: >-
            <?php



            try {
              $add_on = Recurly_Addon::get('gold', 'ipaddresses'); // (plan_code, addon_code)
              $add_on->unit_amount_in_cents['USD']->amount_in_cents = 1200; // $12.00.

              // Recurly RevRec Standard/Advanced (RA-Managed)
