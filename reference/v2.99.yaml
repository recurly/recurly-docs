    post:
      summary: Create Account's Billing Info (Token)
      description: >-
        Creates an account's Billing Information using a [token generated by
        Recurly.js](https://docs.recurly.com/js/#getting-a-token). Returns the
        account's created Billing Information.


        [Recurly.js](https://js.recurly.com/) allows you to collect customer
        Billing Information and tokenize it, preventing your servers from having
        to handle credit card information. When you send these tokens to Recurly
        through our API, we unpack the token and update Billing Information
        accordingly.


        When Billing Information is updated, it is only saved if valid. If the
        account has a past due invoice, the outstanding balance will be
        collected to validate the Billing Information.


        If you want to create an account at the same time, you should use the
        [Account API
        end-point](https://docs.recurly.com/api/accounts#create-account) instead
        and include billing info with your request.


        ###### PSD2 and 3DS Authentication

        <div class="alert alert--info" markdown="1">

        [PSD2](https://docs.recurly.com/docs/revised-payment-services-directive-psd2)
        is a regulation from the EEA effective September 2019. It requires 3DS /
        SCA (strong customer authentication) on certain transactions. Recurly
        has updated our gateway integrations to support this flow as well as
        enable merchants to send Recurly the required parameters.This feature
        enables the fetching of ThreeDSecureActionToken and the passing of a
        ThreeDSecureActionResultToken id through the API.


        This change was made to facilitate the flow of information needed to 3D
        secure a transaction for transactions requiring SCA.


        Merchants with an acquiring bank in the EEA must comply with SCA. They
        must support 3DS2 in order to authenticate card holders and send
        authorizations for transactions that were subject to SCA.

        </div>
            
      tags:
        - billing-info
      operationId: createAccountsBillingInfoToken
      parameters:
        - in: path
          name: account_code
          schema:
            type: string
            default: ''
          required: true
          description: Account's unique code.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              required:
                - token_id
              properties:
                token_id:
                  type: string
                  default: ''
                  description: >-
                    A token [generated by
                    Recurly.js](https://recurly.com/developers/reference/recurly-js/#getting-a-token)
                currency:
                  type: string
                  default: ''
                  description: >-
                    Currency in which invoices will be posted. Only applicable
                    if this account is enrolled in a plan has a different
                    currency than your site's default.
                three_d_secure_action_result_token_id:
                  type: string
                  default: ''
                  description: >-
                    An id returned by Recurly.js referencing the result of the
                    3DS authentication for
                    [PSD2](https://docs.recurly.com/docs/revised-payment-services-directive-psd2)
                transaction_type:
                  type: string
                  default: ''
                  description: >-
                    Indicates type of resulting transaction. accepted_values:
                    "moto".
                primary_payment_method:
                  type: boolean
                  default: false unless first billing info, then true for primary
                  description: >-
                    The `primary_payment_method` field is used to designate the
                    primary billing info on the account. The first billing info
                    created on an account will always become primary. Adding
                    additional billing infos provides the flexibility to mark
                    another billing info as primary, or adding additional
                    non-primary billing infos. This can be accomplished by
                    passing the `primary_payment_method` field. When adding
                    billing infos via the billing_info and /accounts endpoints,
                    this value is not permitted, and will return an error if
                    provided.
                backup_payment_method:
                  type: boolean
                  default: false
                  description: >-
                    The `backup_payment_method` field is used to designate a
                    billing info as a backup on the account that will be tried
                    if initial billing_info used for the invoice fails. All
                    payment methods, including the billing info marked
                    `primary_payment_method` can be set as a backup. An account
                    can have a maximum of 1 backup; if a user sets a different
                    payment method as a backup, the existing backup will no
                    longer be marked as such.
      responses:
        '201':
          description: ''
          content:
            application/xml:
              example: >-
                <billing_info
                href="https://your-subdomain.recurly.com/v2/accounts/1/billing_info"
                type="credit_card">
                  <account href="https://your-subdomain.recurly.com/v2/accounts/1"/>
                  <first_name>Verena</first_name>
                  <last_name>Example</last_name>
                  <company nil="nil"></company>
                  <address1>123 Main St.</address1>
                  <address2 nil="nil"></address2>
                  <city>San Francisco</city>
                  <state>CA</state>
                  <zip>94105</zip>
                  <country>US</country>
                  <phone nil="nil"></phone>
                  <vat_number>US1234567890</vat_number>
                  <ip_address>127.0.0.1</ip_address>
                  <ip_address_country>US</ip_address_country>
                  <primary_payment_method type="boolean">true</primary_payment_method>
                  <backup_payment_method type="boolean">false</backup_payment_method>
                  <card_type>Visa</card_type>
                  <year type="integer">2019</year>
                  <month type="integer">11</month>
                  <first_six>411111</first_six>
                  <last_four>1111</last_four>
                  <cc_bin_country nil="nil"></cc_bin_country>
                  <updated_at type="datetime">2017-02-17T15:38:53Z</updated_at>
                </billing_info>
        '404':
          description: ''
          content:
            application/xml:
              example: |-
                <error>
                  <symbol>token_invalid</symbol>
                  <description>Token is either invalid or expired</description>
                </error>
      x-codeSamples:
        - lang: xml
          source: |-
            <billing_info>
              <token_id>TOKEN_ID</token_id>
            </billing_info>
        - lang: PHP
          source: |-
            <?php

            try {
              $billing_info = new Recurly_BillingInfo();
              $billing_info->account_code = 'b6f5783';
              $billing_info->token_id = '7z6furn4jvb9'; // From Recurly.js
              $billing_info->create();

              print "Billing Info: $billing_info";
            } catch (Recurly_NotFoundError $e) {
              // Could not find account or token is invalid or expired
              print "Not Found: $e";
            }
        - lang: Ruby
          source: |-
            account = Recurly::Account.find('1')
            account.billing_info = {
              token_id: 'TOKEN_ID'
            }
            account.billing_info.save!
        - lang: Python
          source: |-
            account = Account.get('1')
            billing_info = account.billing_info
            billing_info.token_id = 'TOKEN_ID'
            account.update_billing_info(billing_info)
        - lang: Dotnet
          source: |-
            var account = Accounts.Get("1");
            var info = new BillingInfo(account);
            info.TokenId = "TOKEN_ID";
            info.Create();
