        unit_amount_in_cents:
          type: string
          default: ''
          description: >-
            Positive amount for a charge, negative amount for a credit. Max
            10000000.
        tax_inclusive:
          $ref: '#/components/schemas/TaxInclusive'
        quantity:
          type: integer
          default: '1'
          description: Quantity.
        description:
          type: string
          default: ''
          description: Description of the adjustment for the invoice.
        accounting_code:
          type: string
          default: ''
          description: Accounting code. Max of 20 characters.
        revenue_schedule_type:
          type: string
          default: ''
          description: >-
            Optional field for setting a revenue schedule type. This will
            determine how revenue for the associated Charge should be
            recognized. Available schedule types are `never`, `at_range_start`,
            `at_invoice`, and—if `end_date` is set—`evenly` and `at_range_end`.
        tax_exempt:
          type: boolean
          default: ''
          description: >-
            `true` exempts tax on the charge, `false` applies tax on the charge.
            If not defined, then defaults to the Plan and Site settings. This
            attribute does not work for credits (negative adjustments). Credits
            are always post-tax. Pre-tax discounts should use the Coupons
            feature.
        tax_code:
          type: string
          maxLength: 50
          title: Tax code
          description: >-
            Optional field used by Avalara, Vertex, and Recurly's In-the-Box tax
            solution to determine taxation rules. You can pass in specific tax
            codes using any of these tax integrations. For Recurly's In-the-Box
            tax offering you can also choose to instead use simple values of
            `unknown`, `physical`, or `digital` tax codes.
        start_date:
          type: string
          format: date-time
          default: now
          description: A timestamp associated with when the charge began.
        end_date:
          type: string
          format: date-time
          default: ''
          description: A timestamp associated with when the charge ended.
        product_code:
          type: string
          default: ''
          description: >-
            The product code or SKU of the line item. Max of 50 characters.
            Useful for later reporting on product purchases.
        item_code:
          type: string
          default: ''
          description: >-
            The `item_code` for the item associated with the adjustment, if
            there is one. Associates the adjustment with an item and sets
            related attributes on the adjustment from the default values on the
            item. `<description>`, `<product_code>`, `<accounting_code>`,
            `<tax_exempt>` and `<tax_code>` are not accepted when `<item_code>`
            is present.
        liability_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        revenue_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        performance_obligation_id:
          $ref: '#/components/schemas/PerformanceObligationId'
        origin_tax_address_source:
          $ref: '#/components/schemas/OriginTaxAddressSourceEnum'
        destination_tax_address_source:
          $ref: '#/components/schemas/DestinationTaxAddressSourceEnum'
        vertex_transaction_type:
          $ref: '#/components/schemas/VertexTransactionTypeEnum'
      xml:
        name: adjustment
    Adjustment:
      allOf:
        - $ref: '#/components/schemas/AdjustmentBase'
        - type: object
          properties:
            type:
              type: string
              description: 'The type of adjustment to return: `charge` or `credit`.'
            liability_gl_account_code:
              $ref: '#/components/schemas/GeneralLedgerAccountCode'
            revenue_gl_account_code:
              $ref: '#/components/schemas/GeneralLedgerAccountCode'
    BillingInfoCC:
      type: object
      properties:
        number:
          type: string
          example: 4111-1111-1111-1111
        month:
          type: string
          example: 12
        year:
          type: string
          example: 2038
      xml:
        name: billing_info
    BusinessEntity:
      type: object
      description: Business entity details
      properties:
        id:
          title: Business entity ID
          type: string
          maxLength: 13
          readOnly: true
        code:
          title: Business entity code
          type: string
          maxLength: 50
          description: The entity code of the business entity.
        name:
          type: string
          title: Name
          description: >-
            This name describes your business entity and will appear on the
            invoice.
          maxLength: 255
        invoice_display_address:
          title: Invoice display address
          description: >-
            Address information for the business entity that will appear on the
            invoice.
          $ref: '#/components/schemas/Address'
        tax_address:
          title: Tax address
          description: >-
            Address information for the business entity that will be used for
            calculating taxes.
          $ref: '#/components/schemas/Address'
        origin_tax_address_source:
          $ref: '#/components/schemas/OriginTaxAddressSourceEnum'
        destination_tax_address_source:
          $ref: '#/components/schemas/DestinationTaxAddressSourceEnum'
        subscriber_location_countries:
          type: array
          title: Subscriber location countries
          description: List of countries for which the business entity will be used.
          items:
            type: object
        default_vat_number:
          type: string
          title: Default VAT number
          description: VAT number for the customer used on the invoice.
          maxLength: 20
        default_registration_number:
          type: string
          title: Default registration number
          description: Registration number for the customer used on the invoice.
          maxLength: 30
        created_at:
          type: string
          format: date-time
          title: Created at
          readOnly: true
        updated_at:
          type: string
          format: date-time
          title: Last updated at
          readOnly: true
        default_liability_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
        default_revenue_gl_account_id:
          $ref: '#/components/schemas/GeneralLedgerAccountId'
    CouponCodes:
      type: array
      description: >-
        Provide this elements if you want to redeem multiple coupons. You must
        have Multiple Coupons Per Account enabled in Coupon Settings in order to
        redeem multiple coupons.
      items:
        properties:
          coupon_code:
            $ref: '#/components/schemas/CouponCode'
      xml:
        name: coupon_codes
    CreditPayment:
      type: object
      properties:
        account:
          type: string
          description: The URL of the account for the credit payment.
        uuid:
          type: string
          description: The unique identifier of the credit payment.
        action:
          type: string
          description: >-
            The action the credit payment was created for. Is also a query param
            on the main list. Allowed Values: [payment, gift_card, refund,
            reduction, write_off].
        currency:
          type: string
          description: Currency, 3-letter ISO code.
        amount_in_cents:
          type: integer
          description: Amount of the credit payment.
        original_invoice:
          type: string
          description: The URL of the original invoice for the credit payment.
        applied_to_invoice:
          type: string
          description: The URL of the invoice on which this payment was applied.
        original_credit_payment:
          type: string
          description: >-
            The reference of the original credit payment being refunded. Only
            shown if action = 'refund'.
        refund_transaction:
          type: string
          description: >-
            The reference of the refund transaction that matches the refund
            credit payment. Only shown if action = 'refund'.
        created_at:
          type: string
          format: date-time
          description: When the credit payment was created.
        updated_at:
          type: string
          format: date-time
          description: >-
            When the credit payment was created or updated. Will only update if
            voided.
        voided_at:
          type: string
          format: date-time
          description: >-
            When the credit payment was voided. Will only be voided if the
            credit payment was on a charge invoice that was then failed.
    DestinationTaxAddressSourceEnum:
      type: string
      title: Destination tax address source
      description: >-
        The source of the address that will be used as the destinaion in
        determining taxes. Available only when the site is on an Elite plan. A
        value of "destination" refers to the "Customer tax address". A value of
        "origin" refers to the "Business entity tax address".
      default: destination
      enum:
        - destination
        - origin
    DunningCampaign:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
          description: Campaign code.
        name:
          type: string
          description: Campaign name.
        description:
          type: string
          description: Campaign description.
        default_campaign:
          type: boolean
          description: >-
            Whether or not this is the default campaign for accounts or plans
            without an assigned dunning campaign.
        dunning_cycles:
          type: array
          description: Dunning Cycle settings.
          items:
            $ref: '#/components/schemas/DunningCycle'
        created_at:
          type: string
          format: date-time
          description: When the current campaign was created in Recurly.
        updated_at:
          type: string
          format: date-time
          description: When the current campaign was updated in Recurly.
        deleted_at:
          type: string
          format: date-time
          description: When the current campaign was deleted in Recurly.
    DunningCycle:
      type: object
      properties:
        type:
          enum:
            - automatic
        applies_to_manual_trial:
          type: boolean
          description: >-
            Whether the dunning settings will be applied to manual trials. Only
            applies to trial cycles.
        first_communication_interval:
          type: integer
          description: >-
            The number of days after a transaction failure before the first
            dunning email is sent.
        send_immediately_on_hard_decline:
          type: boolean
          description: >-
            Whether or not to send an extra email immediately to customers whose
            initial payment attempt fails with either a hard decline or invalid
            billing info.
        intervals:
          type: array
          description: Dunning intervals.
          items:
            $ref: '#/components/schemas/DunningInterval'
        expire_subscription:
          type: boolean
          description: >-
            Whether the subscription(s) should be cancelled at the end of the
            dunning cycle.
        fail_invoice:
          type: boolean
          description: >-
            Whether the invoice should be failed at the end of the dunning
            cycle.
        total_dunning_days:
          type: integer
          description: >-
            The number of days between the first dunning email being sent and
            the end of the dunning cycle.
        total_recycling_days:
          type: integer
          description: >-
            The number of days between a transaction failure and the end of the
            dunning cycle.
        version:
          type: integer
          description: Current campaign version.
        created_at:
          type: string
          format: date-time
          description: When the current settings were created in Recurly.
        updated_at:
          type: string
          format: date-time
          description: When the current settings were updated in Recurly.
    DunningInterval:
      properties:
        days:
          type: integer
          description: Number of days before sending the next email.
        email_template:
          type: string
          description: Email template being used.
    Entitlement:
      type: object
      properties:
        object:
          type: string
          description: Entitlement
        customer_permission:
          $ref: '#/components/schemas/CustomerPermission'
        granted_by:
          type: array
          description: Subscription or item that granted the customer permission.
          items:
            $ref: '#/components/schemas/GrantedBy'
        created_at:
          type: string
          format: date-time
          description: Time object was created.
        updated_at:
          type: string
          format: date-time
          description: Time the object was last updated
    Entitlements:
      type: object
      description: >-
        A list of privileges granted to a customer through the purchase of a
        plan or item.
      properties:
        object:
          type: string
          title: Object Type
        has_more:
          type: boolean
          description: Indicates there are more results on subsequent pages.
        next:
          type: string
          description: Path to subsequent page of results.
        data:
          type: array
          items:
            $ref: '#/components/schemas/Entitlement'
    CustomerPermission:
      type: object
      properties:
        id:
          type: string
          description: Customer permission ID.
        code:
          type: string
          description: Customer permission code.
        name:
          type: string
          description: Customer permission name.
        description:
          type: string
          description: Description of customer permission.
        object:
          type: string
          description: It will always be "customer_permission".
    GrantedBy:
      type: object
      description: >-
        The subscription or external subscription that grants customer
        permissions.
      properties:
        object:
          type: string
          title: Object Type
        id:
          type: string
          description: >-
            The ID of the subscription or external subscription that grants the
            permission to the account.
    ExternalProductReference:
      type: object
      properties:
        id:
          type: string
          description: >-
            System-generated unique identifier for an external product
            reference.
        reference_code:
          type: string
          description: >-
            A code which associates the external product to a corresponding
            object or resource in an external platform like the Apple App Store
            or Google Play Store.
        external_connection_type:
          type: string
          description: Source connection platform.
        created_at:
          type: string
          format: date-time
          description: When the external product reference was created in Recurly.
        updated_at:
          type: string
          format: date-time
          description: When the external product reference was updated in Recurly.
    ExternalProduct:
      type: object
      properties:
        id:
          type: string
          description: System-generated unique identifier for an external product.
        name:
          type: string
          description: Name to identify the external product in Recurly.
        plan:
          $ref: '#/components/schemas/PlanMini'
        created_at:
          type: string
          format: date-time
          description: When the external product was created in Recurly.
        updated_at:
          type: string
          format: date-time
          description: When the external product was updated in Recurly.
        external_product_references:
          type: array
          description: List of external product references of the external product.
          items:
            $ref: '#/components/schemas/ExternalProductReference'
    ExternalSubscription:
      type: object
      properties:
        account:
          type: string
          description: The URL of the account for the specified external subscription.
        external_product_reference:
          $ref: '#/components/schemas/ExternalProductReference'
        external_payment_phases:
          type: array
          items:
            $ref: '#/components/schemas/ExternalPaymentPhase'
        uuid:
          type: string
          description: Universally Unique Identifier created automatically.
        last_purchased:
          type: string
          format: date-time
          description: >-
            When a new billing event occurred on the external subscription in
            conjunction with a recent billing period, reactivation or
            upgrade/downgrade.
        auto_renew:
          type: boolean
          default: false
          description: >-
            An indication of whether or not the external subscription will
            auto-renew at the expiration date.
        in_grace_period:
          type: boolean
          title: In grace period
          description: >-
            An indication of whether or not the external subscription is in a
            grace period.
          default: false
        app_identifier:
          type: string
          description: Identifier of the app that generated the external subscription.
        quantity:
          type: integer
          default: '1'
          description: An indication of the quantity of a subscribed item's quantity.
        state:
          type: string
          description: >-
            External subscriptions can be active, canceled, expired, or
            past_due.
          default: active
        activated_at:
          type: string
          format: date-time
          description: >-
            When the external subscription was activated in the external
            platform.
        canceled_at:
          type: string
          format: date-time
          title: Canceled at
          description: >-
            When the external subscription was canceled in the external
            platform.
        expires_at:
          type: string
          format: date-time
          description: When the external subscription expires in the external platform.
        trial_started_at:
          type: string
          format: date-time
          title: Trial started at
          description: >-
            When the external subscription trial period started in the external
            platform.
        trial_ends_at:
          type: string
          format: date-time
          title: Trial ends at
          description: >-
            When the external subscription trial period ends in the external
            platform.
        test:
          type: boolean
          title: Test
          description: >-
            An indication of whether or not the external subscription was
            purchased in a sandbox environment.
          default: false
        imported:
          type: boolean
          title: Imported
          description: >-
            An indication of whether or not the external subscription was
            created by a historical data import.
          default: false
        created_at:
          type: string
          format: date-time
          description: When the external subscription was created in Recurly.
        updated_at:
          type: string
          format: date-time
          description: When the external subscription was updated in Recurly.
    ExternalInvoice:
      type: object
      properties:
        id:
          type: string
          title: External invoice ID
          description: >-
            System-generated unique identifier for an external invoice ID, e.g.
            `e28zov4fw0v2`.
        object:
          type: string
          title: Object type
        account:
          $ref: '#/components/schemas/AccountMini'
        external_subscription:
          $ref: '#/components/schemas/ExternalSubscription'
        external_payment_phase:
          $ref: '#/components/schemas/ExternalPaymentPhase'
        external_id:
          type: string
          description: >-
            An identifier which associates the external invoice to a
            corresponding object in an external platform.
        state:
          $ref: '#/components/schemas/ExternalInvoiceStateEnum'
        total:
          type: string
          format: decimal
          title: Total
        currency:
          type: string
          title: Currency
          description: 3-letter ISO 4217 currency code.
        line_items:
          type: array
          items:
            $ref: '#/components/schemas/ExternalCharge'
        purchased_at:
          type: string
          format: date-time
          description: When the invoice was created in the external platform.
        created_at:
          type: string
          format: date-time
          description: When the external invoice was created in Recurly.
        updated_at:
          type: string
          format: date-time
          title: Updated at
          description: When the external invoice was updated in Recurly.
    ExternalInvoiceStateEnum:
      type: string
      enum:
        - paid
    ExternalCharge:
      type: object
      description: >-
        Charge from an external resource such as Apple App Store or Google Play
        Store.
      properties:
        id:
          type: string
          title: External invoice ID
          description: >-
            System-generated unique identifier for an external charge ID, e.g.
            `e28zov4fw0v2`.
        object:
          type: string
          title: Object type
        account:
          $ref: '#/components/schemas/AccountMini'
        currency:
          type: string
          title: Currency
          description: 3-letter ISO 4217 currency code.
        unit_amount:
          type: string
          format: decimal
          title: Unit Amount
        quantity:
          type: integer
        description:
          type: string
        external_product_reference:
          $ref: '#/components/schemas/ExternalProductReferenceMini'
        created_at:
          type: string
          format: date-time
          title: Created at
          description: When the external charge was created in Recurly.
        updated_at:
          type: string
          format: date-time
          title: Updated at
          description: When the external charge was updated in Recurly.
    ExternalProductReferenceMini:
      type: object
      title: External Product Reference details
      description: External Product Reference details
      properties:
        id:
          type: string
          title: External Product ID
          description: >-
            System-generated unique identifier for an external product ID, e.g.
            `e28zov4fw0v2`.
        object:
          type: string
          title: object
        reference_code:
          type: string
          title: reference_code
          description: >-
            A code which associates the external product to a corresponding
            object or resource in an external platform like the Apple App Store
            or Google Play Store.
        external_connection_type:
          type: string
          title: external_connection_type
          description: Source connection platform.
        created_at:
          type: string
          format: date-time
          description: When the external product was created in Recurly.
        updated_at:
          type: string
          format: date-time
          description: When the external product was updated in Recurly.
    ExternalPaymentPhase:
      type: object
      properties:
        started_at:
          type: string
          format: date-time
        ends_at:
          type: string
          format: date-time
        starting_billing_period_index:
          type: integer
          title: Starting Billing Period Index
        ending_billing_period_index:
          type: integer
          title: Ending Billing Period Index
        offer_type:
          type: string
          title: Offer Type
          description: Type of discount offer given, e.g. "FREE_TRIAL"
        offer_name:
          type: string
          title: Offer Name
          description: Name of the discount offer given, e.g. "introductory"
        period_count:
          type: integer
          title: Period Count
          description: Number of billing periods
        period_length:
          type: string
          title: Period Length
          description: Billing cycle length
        amount:
          type: string
          format: decimal
          title: Amount
          minimum: 0
          description: Allows up to 9 decimal places
        currency:
          type: string
          title: Currency
          description: 3-letter ISO 4217 currency code.
        created_at:
          type: string
          format: date-time
          title: Created at
          description: When the external charge was created in Recurly.
        updated_at:
          type: string
          format: date-time
          title: Updated at
          description: When the external charge was updated in Recurly.
    RequestError:
      type: object
      title: Error
      properties:
        type:
          title: Type
          $ref: '#/components/schemas/ErrorTypeEnum'
        symbol:
          type: string
        description:
          type: string
      xml:
        name: error
    Error:
      type: object
      title: Error
      properties:
        symbol:
          type: string
        description:
          type: string
      xml:
        name: error
      example: |-
        <error>
          <symbol>not_found</symbol>
          <description lang="en-US">Couldn't find BillingInfo with account_code = 1</description>
        </error>
    DefaultError:
      type: object
      properties:
        type:
          title: Type
          $ref: '#/components/schemas/ErrorTypeEnum'
        message:
          type: string
          title: Message
        params:
          type: array
          title: Parameter specific errors
          items:
            type: object
            properties:
              param:
                type: string
    Errors:
      type: array
      items:
        $ref: '#/components/schemas/Error'
      xml:
        name: errors
    Error404:
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          properties:
            symbol:
              default: not_found
    GeneralLedgerAccount:
      type: object
