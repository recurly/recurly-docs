        - lang: Ruby
          source: |
            plan = Recurly::Plan.find('gold')
            add_on = plan.add_ons.find('ipaddresses')
            add_on.update_attributes(
              unit_amount_in_cents: 12_00,
              # Recurly RevRec Standard/Advanced (RA-Managed)
