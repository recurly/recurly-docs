      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                token_id:
                  type: string
                  default: ''
                  description: >-
                    A token [generated by
                    Recurly.js.](https://docs.recurly.com/js/#getting-a-token)
      responses:
