    put:
      summary: Update an Account's Billing Info (Token)
      description: >-
        Updates an account's Billing Information using a token [generated by
        Recurly.js](https://docs.recurly.com/js/#getting-a-token). Returns the
        account's current Billing Information.


        [Recurly.js](https://js.recurly.com/) allows you to collect customer
        Billing Information and tokenize it, preventing your servers from having
        to handle credit card information. When you send these tokens to Recurly
        through our API, we unpack the token and update Billing Information
        accordingly.


        When Billing Information is updated, it is only saved if valid. If the
        account has a past due invoice, the outstanding balance will be
        collected to validate the Billing Information.


        If you want to create an account at the same time, you should use the
        [Account API
        end-point](https://docs.recurly.com/api/accounts#create-account) instead
        and include billing info with your request.
      tags:
        - billing-info
      operationId: updateAnAccountsBillingInfoToken
      parameters:
        - in: path
