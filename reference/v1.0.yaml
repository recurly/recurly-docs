    post:
      summary: Create an Add-On
      description: >-
        Add an add-on to a plan.


        **ATTRIBUTES**

        | Attribute | Description |

        | --- | --- |

        | `add_on_code` | Add On Code. Max of 50 characters. |

        | `name` | Add-on name. Max of 255 characters. |

        | `unit_amount_in_cents` | Array of unit amounts for currencies. Max
        10000000. |

        | `default_quantity` | Default quantity for the hosted pages, defaults
        to 1. |

        | `display_quantity_on_hosted_page` | If true, display a quantity field
        on the hosted pages for the add-on. |

