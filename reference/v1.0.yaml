  /coupons/{coupon_code}/redeem:
    post:
      summary: Redeem a Coupon Before or After a Subscription
      description: >+
        Most coupons are redeemed during a new subscription. This endpoint
        allows you to redeem a coupon for a customer after their initial
        subscription, or in anticipation of a future subscription. When you
        redeem a coupon on an account, the coupon will be applied to the next
        subscription creation (new subscription), modification (e.g. upgrade or
        downgrade), or renewal.

      tags:
        - coupon-redemptions
      operationId: redeemACouponBeforeOrAfterASubscription
      parameters:
        - in: path
          name: coupon_code
          schema:
            type: string
          required: true
          description: Coupon Code.
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                account_code:
                  type: integer
                  default: ''
                  description: Account code to apply redemption
                currency:
                  type: string
                  default: ''
                  description: Currency for the redemption
      responses:
        '201':
          description: ''
          content:
            application/xml:
              example: >-
                Status: 201 Created

                Content-Type: application/xml; charset=utf-8

                Location:
                https://your-subdomain.recurly.com/v2/accounts/1/redemption

                <?xml version="1.0" encoding="UTF-8"?>

