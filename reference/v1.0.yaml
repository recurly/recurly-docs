          source: "using System.Linq;\n\n// Get the list of invoices through the Account\nvar account = Accounts.Get(\"1\");\nvar invoices = account.GetInvoices();\n\n// OR directly through Invoices\nvar invoices = Invoices.List(\"1\"); // account code\n\nwhile (invoices.Any())\n{\n\tforeach (var invoice in invoices)\n\t\tConsole.WriteLine(\"Invoice: \" + invoice);\n\tinvoices = invoices.Next;\n}"
    post:
      summary: 'Post an Invoice: Invoice Pending Charges on an Account'
      description: >-
        When you post one-time charges to an account, these will remain pending
        until they are invoiced. An account is automatically invoiced when the
        subscription renews. However, there are times when it is appropriate to
        invoice an account before the renewal. If the subscriber has a yearly
        subscription, you might want to collect the one-time charges well before
        the renewal.


        **INVOICE ATTRIBUTES**

        | Invoice Parameters | Description |

        | --- | --- |

        | `terms_and_conditions` | Optional notes field. This will default to
        the Terms and Conditions text specified on the Invoice Settings page in
        your Recurly admin. Specify custom notes with this tag to add or
        override Terms and Conditions. Custom notes will stay with a
        subscription on all renewals. |

        | `customer_notes` | Optional notes field. This will default to the
        Customer Notes text specified on the Invoice Settings page in your
        Recurly admin. Specify custom notes with this tag to add or override
        Customer Notes. Custom notes will stay with a subscription on all
        renewals. |

        | `vat_reverse_charge_notes` | VAT Reverse Charge Notes only appear if
        you have EU VAT enabled or are using your own Avalara AvaTax account and
        the customer is in the EU, has a VAT number, and is in a different
        country than your own. This will default to the VAT Reverse Charge Notes
        text specified on the Tax Settings page in your Recurly admin, unless
        custom notes were created with the original subscription. Specify custom
        notes with this tag to add or override VAT Reverse Charge Notes. Custom
        notes will stay with a subscription on all renewals. |

        | `collection_method` | Can be either 'automatic' or 'manual'. Defaults
        to 'automatic'. |

        | `net_terms` | Integer representing the number of days after an
        invoice's creation that the invoice will become past due. If an
        invoice's net terms are set to '0', it is due 'On Receipt' and will
        become past due 24 hours after it’s created. If an invoice is due net
        30, it will become past due at 31 days exactly. Defaults to '0'. |

        | `po_number` | Optional notes field. Attach a PO number to the invoice.
        |




        <div class="alert alert--warning" markdown="1">

        This API call will return the new invoice's details on success. If there
        are no pending charges, it will return an HTTP status code of `422
        Unprocessable Entity`.

        </div>
            
      tags:
        - invoices
      operationId: postAnInvoiceInvoicePendingChargesOnAnAccount
      parameters:
        - in: path
          name: account_code
          schema:
            type: string
          required: true
