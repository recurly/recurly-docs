    post:
      summary: Create Coupon
      description: >-
        Creates a new coupon. Please note: coupons cannot be updated after being
        created.


        **DISCOUNT IN DOLLARS**

        When specifying a discount amount as a flat amount, the currency must be
        specified with the amount in an array. For example:

        ```

        <discount_type>dollars</discount_type>

        <discount_in_cents>
          <USD>500</USD>
          <EUR>400</EUR>
          <GBP>300</GBP>
        </discount_in_cents>

        ```

        **DISCOUNT IN PERCENTAGE**

        Percentage discounts only need to specify the discount percentage. For
        example:

        ```

        <discount_type>percent</discount_type>

        <discount_percent>10</discount_percent>

        ```

        **LIMITING TO SPECIFIC PLANS**

        If a coupon applies to all plans, it will also apply to any plans
        created in the future. To limit a coupon to specific plans, you may
        specify an array of plan codes. For example:

        ```

        <applies_to_all_plans>false</applies_to_all_plans>

        <plan_codes>
          <plan_code>silver</plan_code>
          <plan_code>gold</plan_code>
        </plan_codes>

        ```
      tags:
        - coupons
      operationId: createCoupon
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                coupon_code:
                  type: string
                  default: ''
                  description: >-
                    Unique code to identify and redeem the coupon. This code may
                    only contain the following characters: [a-z A-Z 0-9 @ - _
                    .]. Max of 50 characters
                name:
                  type: string
                  default: ''
                  description: Coupon name
                hosted_description:
                  type: string
                  default: ''
                  description: Description of the coupon on the hosted payment pages
                invoice_description:
                  type: string
                  default: ''
                  description: Description of the coupon on the invoice
                redeem_by_date:
                  type: string
                  format: date
                  default: ''
                  description: Last date to redeem the coupon, defaults to no date
                single_use:
                  type: boolean
                  default: ''
                  description: If true, the coupon applies to the first invoice only
                applies_for_months:
                  type: integer
                  default: ''
                  description: >-
                    Number of months after redemption that the coupon is valid,
                    defaults to no date
                max_redemptions:
                  type: string
                  default: ''
                  description: >-
                    Maximum number of accounts that may use the coupon before it
                    can no longer be redeemed
                applies_to_all_plans:
                  type: boolean
                  default: ''
                  description: The coupon is valid for all plans if true, defaults to true
                discount_type:
                  type: string
                  default: ''
                  description: '"percent" or "dollars"'
                discount_percent:
                  type: integer
                  default: ''
                  description: Discount percentage if discount_type is "percent"
                discount_in_cents:
                  type: integer
                  default: ''
                  description: >-
                    Mapping of discount amounts by currency if discount_type is
                    "dollars". Max 10000000.
                plan_codes:
                  type: string
                  default: ''
                  description: >-
                    Array of plan_codes the coupon applies to, if
                    applies_to_all_plans is false
      responses:
        '201':
          description: ''
          content:
            application/xml:
              example: >-
                Status: 201 Created

                Content-Type: application/xml; charset=utf-8

                Location: https://your-subdomain.recurly.com/v2/coupons/special


                <?xml version="1.0" encoding="UTF-8"?>

                <coupon
                href="https://your-subdomain.recurly.com/v2/coupons/special">
                  <redemptions href="https://your-subdomain.recurly.com/v2/coupons/special/redemptions"/>
                  <coupon_code>special</coupon_code>
                  <name>Special 10% off</name>
                  <state>redeemable</state>
                  <discount_type>percent</discount_type>
                  <discount_percent type="integer">10</discount_percent>
                  <redeem_by_date type="datetime">2016-07-04T07:00:00Z</redeem_by_date>
                  <single_use type="boolean">true</single_use>
                  <applies_for_months nil="nil"></applies_for_months>
                  <max_redemptions type="integer">10</max_redemptions>
                  <applies_to_all_plans type="boolean">false</applies_to_all_plans>
                  <created_at type="datetime">2015-04-10T07:00:00Z</created_at>
                  <plan_codes type="array">
                    <plan_code>gold</plan_code>
                    <plan_code>platinum</plan_code>
                  </plan_codes>
                  <a name="redeem" href="https://your-subdomain.recurly.com/v2/coupons/special/redeem" method="post"/>
                </coupon>
      x-codeSamples:
        - lang: PHP
          source: |-
            try {
              $coupon = new Recurly_Coupon();
              $coupon->coupon_code = 'special';
              $coupon->redeem_by_date = '2016-07-04';
              $coupon->single_use = true;

              // $2 off...
