  /subscriptions/{uuid}/cancel:
    put:
      summary: Cancel Subscription
      description: >-
        Cancel a subscription so it remains active and then expires at the end
        of the current bill cycle.


        Canceling a subscription turns off the subscription's auto-renewal. The
        subscription will continue through the current, invoiced term. When the
        subscription is up for renewal, the account will transition to a free
        account and the subscription will no longer be active.


        When a subscription is canceled, Recurly will send a cancelation
        webhook. Recurly will send an additional subscription expired webhook
        once the subscription is no longer active.



        <div class="alert alert--warning" markdown="1">

        Please note: If a subscription that is set to start in the future is
        canceled, the subscription will be deleted from the account and will not
        show up in the account's subscription list.

        </div>
            
      tags:
        - subscriptions
      operationId: cancelSubscription
      parameters:
        - in: path
          name: uuid
          schema:
            type: string
          required: true
          description: Uuid.
      responses:
        '200':
          description: ''
          content:
            application/json:
              example: '{}'
        '400':
          description: ''
          content:
            application/json:
              example: '{}'
      x-codeSamples:
        - lang: PHP
          source: |-
            try {
              $subscription = Recurly_Subscription::get('44f83d7cba354d5b84812419f923ea96');
              $subscription->cancel();

              print "Subscription: $subscription";
            } catch (Recurly_NotFoundError $e) {
              print "Subscription Not Found: $e";
            } catch (Recurly_Error $e) {
              print "Subscription already canceled: $e";
            }
        - lang: Ruby
          source: >-
            subscription =
            Recurly::Subscription.find('44f83d7cba354d5b84812419f923ea96')

            subscription.cancel
        - lang: Python
          source: |-
            subscription = Subscription.get('44f83d7cba354d5b84812419f923ea96')
            subscription.cancel()
        - lang: Dotnet
          source: >-
            var subscription =
            Subscriptions.Get("44f83d7cba354d5b84812419f923ea96");

            subscription.Cancel();
  /subscriptions/{uuid}/reactivate:
    put:
      summary: Reactivate Canceled Subscription
      description: >-
        Reactivate a canceled subscription so it renews at the end of the
        current bill cycle.


        When a subscription is canceled, it will not renew. It is considered
        active until the end of the current billing period. Then, the
        subscription will end. To renew the subscription without modifying it,
        simply send a reactivation request to this end point.
      tags:
        - subscriptions
      operationId: reactivateCanceledSubscription
      parameters:
        - in: path
          name: uuid
          schema:
            type: string
          required: true
          description: Uuid.
      responses:
        '200':
          description: ''
          content:
            application/text:
              example: ''
