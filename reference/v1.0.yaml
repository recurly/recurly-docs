openapi: 3.0.0
info:
  title: Recurly V2 API
  description: >-
    # Getting Started

    Welcome to the reference documentation for Recurly's XML API v2. Here you
    will find a complete

    reference for all API v2 operations.


    If you're building a new product, or just getting started with Recurly, we
    recommend

    using our newer [JSON API v3](/developers/api/latest).


    Now let's get started with API v2.

    # Authentication

    ##### API Authentication (HTTP Basic)

    Recurly uses HTTP Basic Authentication—your [API
    key](https://app.recurly.com/go/developer/api_access) is securely encrypted
    by the SSL channel.


    If you are testing the API calls via the command line with cURL, try:


    ```

    curl -H 'Accept: application/xml' \
         -H 'Content-Type: application/xml; charset=utf-8' \
         -u [API Key]: https://[subdomain].recurly.com/v2/accounts
    ```


    In most programming languages, the API key can be specified in the
    authentication section of request. If your language requires a username and
    password, enter the API key in the username and set the password to an empty
    string.


    REGENERATING AN API KEY

    Your API key can be regenerated by clicking on the Regenerate button on the
    [API credentials](https://app.recurly.com/go/developer/api_access) page.


    ###### Note

    <div class="alert alert--danger" markdown="1">

    Only one API key may be active on an account at a time. If you choose to
    regenerate your API key, your services will not work until you’ve updated
    all references to your API key. There is only one API key per Recurly site.
    Regenerating the key will regenerate it for all users.


    When regenerating your API key, you may choose to expire the prior key
    immediately or after 12 hours. The 12 hour delay allows you to create a new
    key to replace your existing API key and maintain API access continuity.

    </div>
       ##### Calculating your own authorization header
    Most programming languages encode the authorization header automatically.
    With HTTP Basic Authentication, the `Authorization` header is a string
    containing a Base-64 encoded username and password. In the case of Recurly’s
    API, you need only specify the username as your API key. If your library
    requires a password, set it to an empty string.


    ```

    "Authorization": "Basic " + base64_encode(API Key)

    ```

    ##### Additional headers

    ACCEPT HEADER

    Recurly API v2 returns results as XML. Your requests should always include
    the header requesting the results as XML:


    ```

    Accept: application/xml

    ```


    CONTENT-TYPE HEADER

    When sending data to Recurly in a POST or PUT request, your request must
    specify the content type of your request:


    ```

    Content-Type: application/xml; charset=utf-8

    ```


    If your XML request is invalid, the API will respond with a status code 400
    Bad Request. This commonly occurs when ampersands are not correctly encoded
    in the text of your request. Please inspect the body of the response for
    more details regarding the error.
       # HTTP Status Codes
    **SUCCESSFUL STATUS CODES (2XX)**


    `200 OK`

    The request was successful.

    `201 Created`

    The resource was successfully created. Confirms a success when creating a
    new account, credit, subscription, etc.

    `204 No Content`

    The request was successful and there is no response body.


    **CLIENT ERROR STATUS CODES (4XX)**


    `400 Bad Request`

    The request was invalid or could not be understood by the server.
    Resubmitting the request will likely result in the same error.

    `401 Unauthorized`

    Your API key is missing or invalid.

    `402 Payment Required`

    Your Recurly account is in production mode but is not in good standing.
    Please pay any outstanding invoices.

    `403 Forbidden`

    The login is attempting to perform an action it does not have privileges to
    access. Verify your login credentials are for the appropriate account.

    `404 Not Found`

    The resource was not found with the given identifier. The response body will
    explain which resource was not found.

    `405 Method Not Allowed`

    The requested method is not valid at the given URL.

    `406 Not Acceptable`

    The request's Accept header is not set to application/xml.

    `412 Precondition Failed`

    The request was unsuccessful because a condition was not met. For example,
    this message may be returned if you attempt to cancel a subscription for an
    account that has no subscription.

    `422 Unprocessable Entity`

    Could not process a POST or PUT request because the request is invalid. See
    the response body for more details.

    `429 Too many Requests`

    You have made too many API requests in the last hour. Future API requests
    will be ignored until the beginning of the next hour.


    **SERVER ERROR STATUS CODES (5XX)**


    `500 Internal Server Error`

    The server encountered an error while processing your request and failed.

    `502 Gateway Error`

    The load balancer or web server has trouble connecting to the Recurly app.
    Please try the request again.

    `503 Service Unavailable`

    The service is temporarily unavailable. Please try the request again.


    **FUTURE COMPATIBILITY**


    For future compatibility, please interpret the following status code ranges:


    **200–299** as success,

    **400–499** as client request errors,

    **500–599** as server errors


    ##### 404 Not found responses

    When a lookup, update, or delete request is requested on an object that does
    not exist, the server returns `404 Not Found`:


    ```

    Status: 404 Not Found

    Content-Type: application/xml; charset=utf-8

    ```


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <error>
      <symbol>not_found</symbol>
      <description>The record could not be located.</description>
    </error>

    ```
       # Pagination
    ##### Number of Records

    Endpoints that return a list of resources will include a header indicating
    the total number of records available. This is specified with the
    `X-Records` header. E.g., for an endpoint with 14 records:


    ```

    X-Records: 14

    ```

    ##### Next

    The amount of records returns within a single API request defaults to 50. It
    may be changed to a maximum of 200 using a `per_page` query parameter, e.g.
    to return 200 accounts at a time:


    ```

    https://your-subdomain.recurly.com/v2/accounts?per_page=200

    ```


    When there are more records remaining than fit in the current response, the
    `Link` header is specified with the URI to the next page of results.


    ```

    Status: 200 OK

    X-Records: 204

    Link: <https://your-subdomain.recurly.com/v2/accounts?cursor=1304958672>;
    rel="next"

    ETag: "a4b0568a2278bc591ceb64b31547eb78"

    ```


    CURSORS

    The cursor parameter is a time-based pointer indicating where to resume the
    results. By using a cursor instead of page numbers, the API avoids returning
    duplicate records in the case where additional resources are added between
    pagination requests.

    ##### Previous Pages

    After paginating beyond the first page of results, the Link header will
    include a link to return to the first page of results (`rel="start"`) and
    the previous page (`rel="prev"`):


    ```

    Status: 200 OK

    X-Records: 204

    Link: <https://your-subdomain.recurly.com/v2/transactions>; rel="start",

    <https://your-subdomain.recurly.com/v2/transactions?cursor=-1318344434>;
    rel="prev"

    <https://your-subdomain.recurly.com/v2/transactions?cursor=1318388868>;
    rel="next"

    ETag: "c7431fcfc386fd59ee6c3c2e9ac2a30c"

    ```
       # Rate Limits
    In order to provide a fast response time to all our customers, we may rate
    limit excessive requests. By default, new Recurly sites have the following
    API rate limits:


    * Sandbox sites: 400 requests/min. All requests count towards the rate
    limit.

    * Production sites: 1,000 requests/min. Only GET requests count towards the
    rate limit.


    Once your site moves into production mode, Recurly will only rate limit GET
    requests. New subscriptions, account modifications, and other requests using
    POST, PUT, or DELETE methods will not count against your rate limit.


    The rate limit is calculated over a sliding 5 minute window. This means a
    production site could make 4,000 requests within one minute and not hit the
    rate limit so long as the site made less than 1,000 requests during the
    prior 4 minutes.


    If an API request exceeds the rate limit, the API returns a 429 status code
    indicating `Too Many Requests`. If your business needs a higher limit,
    please contact support.

    ##### HTTP Headers

    Every authenticated API request returns headers with your current rate limit
    information. Your requests’ rate limit headers may look like:


    ```

    X-RateLimit-Limit: 5000

    X-RateLimit-Remaining: 4999

    X-RateLimit-Reset: 1414622019

    ```


    The `X-RateLimit-Limit` is your total request limit during the 5 minute
    window (e.g. requests/min * 5 min). The `X-RateLimit-Remaining` indicates
    the number of requests remaining until your requests will be denied.
    Finally, the `X-RateLimit-Reset` header contains a timestamp for when the
    current window will completely reset assuming no further API requests are
    made.
       # API Validation Errors
    f the requested create, update, or delete cannot be performed due to
    validation errors, the server returns a `422 Unprocessable Entity` response
    with an array of the validation errors:


    ```

    Status: 422 Unprocessable Entity

    Content-Type: application/xml; charset=utf-8

    ```


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <errors>
      <error field="model_name.field_name" symbol="not_a_number" lang="en-US">is not a number</error>
    </errors>

    ```
        
  version: '1.0'
tags:
  - name: accounts
    x-displayName: Accounts
  - name: adjustments
    x-displayName: Adjustments
  - name: billing-info
    x-displayName: Billing Info
  - name: coupons
    x-displayName: Coupons
  - name: coupon-redemptions
    x-displayName: Coupon Redemptions
  - name: invoices
    x-displayName: Invoices
  - name: plans
    x-displayName: Plans
  - name: plan-add-ons
    x-displayName: Plan add-ons
  - name: subscriptions
    x-displayName: Subscriptions
  - name: transactions
    x-displayName: Transactions
security:
  - api_key: []
paths:
  /accounts:
    get:
      summary: List Accounts
      description: >-
        Returns a list of accounts on your site.


        Account States:
             **active**
                  Active accounts
             **closed**
                  Closed accounts

        ###### Please note

        <div class="alert alert--warning" markdown="1">

        An account may be in more than one state. For example, an account may be
        active and have a past-due invoice.

        </div>
            
      tags:
        - accounts
      operationId: listAccounts
      parameters:
        - in: query
          name: state
          schema:
            type: string
            default: all
          required: false
          description: 'The state of accounts to return: "active" or "closed"'
        - in: query
          name: cursor
          schema:
            type: string
            default: ''
          required: false
          description: >-
            Splits records across pages. Leave blank to return the first page.
            Follow the URI in the first page's Link header to fetch the next
            page.
        - in: query
          name: per_page
          schema:
            type: integer
            default: '50'
          required: false
          description: Number of records to return per page, up to a maximum of 200.
      responses:
        '200':
          description: ''
          content:
            application/xml:
              example: |
                <?xml version="1.0" encoding="UTF-8"?>
                <accounts type="array">
                  <account href="https://your-subdomain.recurly.com/v2/accounts/b6f5783">
                    <adjustments href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/adjustments"/>
                    <billing_info href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/billing_info"/>
                    <invoices href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/invoices"/>
                    <redemption href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/redemption"/>
                    <subscriptions href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/subscriptions"/>
                    <transactions href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/transactions"/>
                    <account_code>b6f5783</account_code>
                    <state>active</state>
                    <username nil="nil"></username>
                    <email>verena@example.com</email>
                    <first_name>Verena</first_name>
                    <last_name>Example</last_name>
                    <company_name></company_name>
                    <vat_number nil="nil"></vat_number>
                    <tax_exempt type="boolean">false</tax_exempt>
                    <address>
                      <address1>123 Main St.</address1>
                      <address2 nil="nil"></address2>
                      <city>San Francisco</city>
                      <state>CA</state>
                      <zip>94105</zip>
                      <country>US</country>
                      <phone nil="nil"></phone>
                    </address>
                    <accept_language nil="nil"></accept_language>
                    <hosted_login_token>a92468579e9c4231a6c0031c4716c01d</hosted_login_token>
                    <created_at type="datetime">2015-02-25T12:00:00</created_at>
                  </account>
                  <!-- Continued... -->
                </accounts>
      x-codeSamples:
        - lang: PHP
          source: |-
            $accounts = Recurly_AccountList::getActive();
            foreach ($accounts as $account) {
              print "Account: $account\n";
            }
        - lang: Ruby
          source: |-
            Recurly::Account.find_each do |account|
              puts "Account: #{account.inspect}"
            end
        - lang: Python
          source: |-
            #client version <= 2.1.5
            accounts = Account.all()
            while accounts:
                for account in accounts:
                    print 'Account: %s' % account
                try:
                    accounts = accounts.next_page()
                except PageError:
                    accounts = ()

            #client version 2.1.6+
            for account in Account.all():
                print 'Account: %s' % account
        - lang: Dotnet
          source: "using System.Linq;\n\nvar accounts = Accounts.List();\nwhile (accounts.Any())\n{\n\tforeach (var account in accounts)\n\t\tConsole.WriteLine(account);\n\taccounts = accounts.Next;\n}"
    post:
      summary: Create an Account
      description: |+
        Creates a new account. You may optionally include billing information.

      tags:
        - accounts
      operationId: createAnAccount
      parameters: []
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: object
              properties:
                account_code:
                  type: string
                  default: ''
                  description: >-
                    A unique identifier used by your application to identify the
                    account. This code may only contain the following
                    characters: [a-z 0-9 @ - _ .]. Max of 50 characters.
                username:
                  type: string
                  default: ''
                  description: >-
                    Username, ignore if you do not use usernames. Max of 255
                    characters.
                email:
                  type: string
                  default: ''
                  description: Email address.
                first_name:
                  type: string
                  default: ''
                  description: First name. Max of 255 characters.
                last_name:
                  type: string
                  default: ''
                  description: Last name. Max of 255 characters.
                company_name:
                  type: string
                  default: ''
                  description: Company name. Max of 255 characters.
                vat_number:
                  type: string
                  default: ''
                  description: VAT number to avoid having the VAT applied (if applicable).
                tax_exempt:
                  type: boolean
                  default: ''
                  description: >-
                    true exempts tax on the account, false applies tax on the
                    account. If not defined, then defaults to the Plan and Site
                    settings.
                entity_use_code:
                  type: string
                  default: ''
                  description: >-
                    Avalara AvaTax value that can be passed to identify the
                    customer type for tax purposes. The range of values can be A
                    - R (more info at Avalara). Value is case-sensitive.
                billing_info:
                  type: object
                  default: ''
                  description: >-
                    Nested billing information. If present, the account will
                    only be created after the billing information is validated.
                address:
                  type: object
                  default: ''
                  description: Nested address information.
                accept_language:
                  type: string
                  default: ''
                  description: >-
                    An ISO 639-1 language code from the user's browser,
                    indicating their preferred language and locale.
      responses:
        '201':
          description: ''
          content:
            application/xml:
              example: >-
                Status: 201 Created

                Content-Type: application/xml; charset=utf-8

                Location: https://your-subdomain.recurly.com/v2/accounts/b6f5783



                <?xml version="1.0" encoding="UTF-8"?>

                <account
                href="https://your-subdomain.recurly.com/v2/accounts/b6f5783">
                  <adjustments href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/adjustments"/>
                  <billing_info href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/billing_info"/>
                  <invoices href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/invoices"/>
                  <redemption href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/redemption"/>
                  <subscriptions href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/subscriptions"/>
                  <transactions href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/transactions"/>
                  <account_code>b6f5783</account_code>
                  <state>active</state>
                  <username nil="nil"></username>
                  <email>verena@example.com</email>
                  <first_name>Verena</first_name>
                  <last_name>Example</last_name>
                  <company_name></company_name>
                  <vat_number nil="nil"></vat_number>
                  <tax_exempt type="boolean">false</tax_exempt>
                  <address>
                    <address1>123 Main St.</address>
                    <address2 nil="nil"></address2>
                    <city>San Francisco</city>
                    <state>CA</state>
                    <zip>94105</zip>
                    <country>US</country>
                    <phone nil="nil"></phone>
                  </address>
                  <accept_language nil="nil"></accept_language>
                  <hosted_login_token>a92468579e9c4231a6c0031c4716c01d</hosted_login_token>
                  <created_at type="datetime">2015-02-25T12:00:00</created_at>
                </account>
      x-codeSamples:
        - lang: PHP
          source: |-
            try {
              $account = new Recurly_Account('b6f5783');
              $account->email = 'verena@example.com';
              $account->first_name = 'Verena';
              $account->last_name = 'Example';
              $account->create();

              print "Account: $account";
            } catch (Recurly_ValidationError $e) {
              print "Invalid Account: $e";
            }
        - lang: Ruby
          source: |-
            account = Recurly::Account.create(
              :account_code => '1',
              :email        => 'verena@example.com',
              :first_name   => 'Verena',
              :last_name    => 'Example'
            )
        - lang: Python
          source: |-
            account = Account(account_code='1')
            account.email = 'verena@example.com'
            account.first_name = 'Verena'
            account.last_name = 'Example'
            account.save()
        - lang: Dotnet
          source: |-
            var account = new Account("1")
            {
              Email = "verena@example.com",
              FirstName = "Verena",
              LastName = "Example"
            };
            account.Create();
  /accounts/{account_code}:
    get:
      summary: Get Account
      description: >-
        Returns information about a single account.


        HOSTED LOGIN TOKEN

        You may automatically log the user into their hosted management pages by
        directing the user to:


        `https://:subdomain.recurly.com/account/:hosted_login_token`


        ###### Please note

        <div class="alert alert--warning" markdown="1">

        The client library will raise an exception if the account is not found.

        </div>
            
      tags:
        - accounts
      operationId: getAccount
      parameters:
        - in: path
          name: account_code
          schema:
            type: string
            default: ''
          required: true
          description: Your unique account identifier.
        - in: query
          name: state
          schema:
            type: string
            default: ''
          required: false
          description: '"active" or "closed"'
        - in: query
          name: username
          schema:
            type: string
            default: ''
          required: false
          description: Username, not used within Recurly.
        - in: query
          name: email
          schema:
            type: string
            default: ''
          required: false
          description: Email address.
        - in: query
          name: first_name
          schema:
            type: string
            default: ''
          required: false
          description: First name.
        - in: query
          name: last_name
          schema:
            type: string
            default: ''
          required: false
          description: Last name.
        - in: query
          name: company_name
          schema:
            type: string
            default: ''
          required: false
          description: Company name.
        - in: query
          name: vat_number
          schema:
            type: string
            default: ''
          required: false
          description: VAT number to avoid having the VAT applied (if applicable).
        - in: query
          name: tax_exempt
          schema:
            type: boolean
            default: ''
          required: false
          description: >-
            `true` exempts tax on the account, `false` applies tax on the
            account. If not defined, then defaults to the Plan and Site
            settings.
        - in: query
          name: address
          schema:
            type: object
            default: ''
          required: false
          description: Nested address information.
        - in: query
          name: accept_language
          schema:
            type: string
            default: ''
          required: false
          description: >-
            An ISO 639-1 language code from the user's browser, indicating their
            preferred language and locale.
        - in: query
          name: hosted_login_token
          schema:
            type: string
            default: ''
          required: false
          description: >-
            Unique token for automatically logging the account in to the hosted
            management pages.
        - in: query
          name: created_at
          schema:
            type: string
            format: date-time
            default: ''
          required: false
          description: Date the user was created in Recurly.
        - in: query
          name: vat_location_valid
          schema:
            type: string
            default: ''
          required: false
          description: >-
            Only shows if you have the VAT Location Validation feature turned on
            in Tax Settings. Returns `true` if valid, `false` if invalid, and
            nil (empty) if the account does not fit the requirements for
            validation.
      responses:
        '200':
          description: ''
          content:
            application/xml:
              example: >-
                <?xml version="1.0" encoding="UTF-8"?>

                <account
                href="https://your-subdomain.recurly.com/v2/accounts/b6f5783">
                  <adjustments href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/adjustments"/>
                  <billing_info href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/billing_info"/>
                  <invoices href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/invoices"/>
                  <redemption href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/redemption"/>
                  <subscriptions href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/subscriptions"/>
                  <transactions href="https://your-subdomain.recurly.com/v2/accounts/b6f5783/transactions"/>
                  <account_code>b6f5783</account_code>
                  <state>active</state>
                  <username nil="nil"></username>
                  <email>verena@example.com</email>
                  <first_name>Verena</first_name>
                  <last_name>Example</last_name>
                  <company_name></company_name>
                  <vat_number nil="nil"></vat_number>
                  <tax_exempt type="boolean">false</tax_exempt>
                  <address>
                    <address1>123 Main St.</address1>
                    <address2 nil="nil"></address2>
                    <city>San Francisco</city>
                    <state>CA</state>
                    <zip>94105</zip>
                    <country>US</country>
                    <phone nil="nil"></phone>
                  </address>
                  <accept_language nil="nil"></accept_language>
                  <hosted_login_token>a92468579e9c4231a6c0031c4716c01d</hosted_login_token>
                  <created_at type="datetime">2014-02-25T12:00:00</created_at>
                </account>
      x-codeSamples:
        - lang: PHP
          source: |-
            try {
              $account = Recurly_Account::get('b6f5783');
              print "Account: $account";
            } catch (Recurly_NotFoundError $e) {
              print "Account not found";
            }
        - lang: Ruby
          source: |-
            begin
              account = Recurly::Account.find('b6f5783')
              puts "Account: #{account.inspect}"
            rescue Recurly::Resource::NotFound => e
              puts e.message
            end
        - lang: Python
          source: |-
            try:
              account = Account.get('b6f5783')
              print "Account: %s" % account
            except NotFoundError:
              print "Account not found.\n"
        - lang: Dotnet
          source: "try\n{\n\tvar account = Accounts.Get(\"b6f5783\");\n\tConsole.WriteLine(\"Account \" + account);\n}\ncatch (NotFoundException e)\n{\n\tConsole.WriteLine(\"Account not found.\");\n}"
    delete:
      summary: Close Account
      description: >+
        Marks an account as closed and cancels any active subscriptions. Any
        saved billing information will also be permanently removed from the
        account.

      tags:
        - accounts
      operationId: closeAccount
      parameters:
        - in: path
          name: account_code
          schema:
            type: string
            default: ''
          required: true
          description: Your unique account identifier.
      responses:
        '204':
          description: ''
          content:
            application/xml:
              example: 'Status: 204 No Content'
      x-codeSamples:
        - lang: PHP
          source: |-
            try {
              $account = Recurly_Account::get('b6f5783');
